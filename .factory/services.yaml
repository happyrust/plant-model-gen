commands:
  install: cargo fetch
  context: rg -n "workflow_sync|notify_workflow_sync_async|notify_workflow_sync|external_review\.workflow_sync_path|workflow/sync|title|current_node|task_status|models|opinions|attachments" src docs shells db_options
  typecheck: cargo check --features web_server --bin web_server
  lint: echo "lint skipped for analysis-only backend workflow/sync mission"
  test: cargo check --features web_server --bin web_server

services:
  web_server:
    start: WEB_SERVER_PORT=3100 cargo run --features web_server --bin web_server -- --config db_options/DbOption-mac
    stop: lsof -tiTCP:3100 -sTCP:LISTEN | xargs kill || true
    healthcheck: curl -sf http://127.0.0.1:3100/api/status > /dev/null && echo "web_server ok"
    port: 3100
    depends_on: []

# Analysis-only mission note:
# - `commands.context` is the primary evidence scan.
# - `commands.typecheck` and `commands.test` intentionally share the same narrow backend sanity check to avoid unrelated example/test failures.
# - Validators should prioritize exact file references and code-path evidence over command output.
