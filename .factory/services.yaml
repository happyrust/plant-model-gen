commands:
  test: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo check --bin aios-database --quiet
  room-cli-check: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo check --bin aios-database --quiet
  room-help: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room --help
  room-compute-help: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room compute --help
  room-verify-help: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room verify-json --help
  room-verify-required-input: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room verify-json
  room-verify-missing-input-file: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room verify-json --input /tmp/room-verify-missing.json
  room-verify-fixture: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo run --bin aios-database --quiet -- room verify-json --input tests/fixtures/room_compute_validation.json
  room-release-build: cd /Volumes/DPC/work/plant-code/plant-model-gen && cargo build --release --bin aios-database

services:
  surrealdb:
    start: echo "Reuse existing SurrealDB/local DB configuration; do not start a second instance"
    stop: echo "Do not stop shared SurrealDB from mission automation"
    healthcheck: (lsof -i :8020 >/dev/null || lsof -i :8009 >/dev/null) && echo "SurrealDB port detected" || echo "SurrealDB port not auto-detected"
    port: 8020
    depends_on: []
