commands:
  install: npm --prefix web_console install
  build: npm --prefix web_console run build
  typecheck: cd web_console && npm exec -- vue-tsc --noEmit -p tsconfig.typecheck.json
  lint: echo "lint skipped (not configured)"
  test: cargo check --features web_server --bin web_server
  web-dev: npm --prefix web_console run dev -- --host 127.0.0.1 --port 3110
  rust-fmt: cargo fmt
  rust-check-web: cargo check --features web_server --bin web_server
  web-server-run: WEB_SERVER_PORT=3100 cargo run --features web_server --bin web_server -- --config db_options/DbOption-mac

services:
  web_server:
    start: WEB_SERVER_PORT=3100 cargo run --features web_server --bin web_server -- --config db_options/DbOption-mac
    stop: lsof -tiTCP:3100 -sTCP:LISTEN | xargs kill || true
    healthcheck: curl -sf http://127.0.0.1:3100/api/status > /dev/null && echo "web_server ok"
    port: 3100
    depends_on: []

  web_console_dev:
    start: npm --prefix web_console run dev -- --host 127.0.0.1 --port 3110
    stop: lsof -tiTCP:3110 -sTCP:LISTEN | xargs kill || true
    healthcheck: curl -sf http://127.0.0.1:3110/ > /dev/null && echo "vite ok"
    port: 3110
    depends_on: []
