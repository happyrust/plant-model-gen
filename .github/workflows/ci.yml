name: CI

on:
  push:
    branches: [ "master", "main", "only-csg" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gen-model-check"
      
      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true
      
      - name: Run clippy
        run: cargo clippy --features web_server -- -D warnings
        continue-on-error: true
      
      - name: Check web_server features
        run: cargo check --bin web_server --features web_server

  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gen-model-${{ matrix.os }}"
      
      # Linux 依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential
      
      # Windows 依赖
      - name: Setup Windows build environment
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
      
      # 构建库
      - name: Build library
        run: |
          cargo build --release --lib
        shell: bash
      
      # 构建 web_server（不包含 manifold）
      - name: Build web_server
        run: |
          cargo build --release --bin web_server --no-default-features --features ws,sqlite-index,surreal-save,web_server
        shell: bash
      
      # 测试
      - name: Run tests
        run: |
          cargo test --lib --no-default-features --features ws,sqlite-index,web_server
        shell: bash
        continue-on-error: true
      
      # 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binaries
          path: |
            target/release/web_server${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 7

  build-with-manifold:
    name: Build with Manifold - Linux
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "gen-model-manifold"
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            cmake \
            g++ \
            git
      
      - name: Build with manifold feature
        run: |
          cargo build --release --bin web_server --features ws,gen_model,manifold,sqlite-index,surreal-save,web_server
        continue-on-error: true  # manifold 可能编译失败
      
      - name: Upload manifold build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-with-manifold
          path: target/release/web_server
          retention-days: 7

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      
      - name: Run all tests
        run: |
          cargo test --no-default-features --features ws,sqlite-index,web_server
        continue-on-error: true
      
      - name: Run doc tests
        run: cargo test --doc
        continue-on-error: true

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/only-csg'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Generate documentation
        run: |
          cargo doc --no-deps --features web_server
        env:
          RUSTDOCFLAGS: "-D warnings"
        continue-on-error: true
