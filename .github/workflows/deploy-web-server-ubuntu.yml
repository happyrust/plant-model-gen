name: Deploy Web Server To Ubuntu

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: '要部署的 git ref（分支、tag 或 commit）'
        required: true
        default: 'main'
        type: string
      db_option_file:
        description: 'Ubuntu 部署使用的 DbOption 文件（将上传为远端 /root/DbOption.toml）'
        required: true
        default: 'db_options/DbOption-mac.toml'
        type: string
      remote_host:
        description: '覆盖目标服务器地址；留空则取仓库变量 DEPLOY_REMOTE_HOST'
        required: false
        default: ''
        type: string
      remote_user:
        description: '覆盖 SSH 用户；留空则取仓库变量 DEPLOY_REMOTE_USER 或 root'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTC_WRAPPER: ""
  BUILD_FEATURES: ws,gen_model,manifold,project_hd,surreal-save,sqlite-index,web_server,parquet-export

jobs:
  build-linux-artifact:
    name: Build Linux Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Configure git for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Prepare local patch dependencies
        run: ./shells/prepare_ci_patch_deps.sh
        shell: bash

      - name: Setup git credentials
        run: |
          echo '#!/bin/bash' > /tmp/git-askpass.sh
          echo 'echo "${{ secrets.GH_PAT }}"' >> /tmp/git-askpass.sh
          chmod +x /tmp/git-askpass.sh
        shell: bash

      - name: Configure Cargo to use git CLI
        run: |
          mkdir -p ~/.cargo
          echo "[net]" >> ~/.cargo/config.toml
          echo "git-fetch-with-cli = true" >> ~/.cargo/config.toml
        shell: bash

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy-web-server-ubuntu-x86_64-unknown-linux-gnu
          cache-on-failure: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Build deploy-ready web_server
        run: |
          cargo build --release --bin web_server --target x86_64-unknown-linux-gnu --no-default-features --features "$BUILD_FEATURES"
        shell: bash
        env:
          GIT_ASKPASS: /tmp/git-askpass.sh
          GIT_TERMINAL_PROMPT: 0
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Prepare artifact payload
        run: |
          mkdir -p ci-artifacts
          cp target/x86_64-unknown-linux-gnu/release/web_server ci-artifacts/web_server
          chmod +x ci-artifacts/web_server
          {
            echo "git_ref=${{ inputs.git_ref }}"
            echo "commit=$(git rev-parse HEAD)"
            echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "db_option_file=${{ inputs.db_option_file }}"
          } > ci-artifacts/BUILD_INFO.txt

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: ci-artifacts/
          retention-days: 14

  deploy-ubuntu:
    name: Deploy To Ubuntu
    runs-on: ubuntu-latest
    needs: build-linux-artifact
    environment: production

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: ci-artifacts

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Validate deploy inputs
        env:
          REMOTE_HOST: ${{ inputs.remote_host != '' && inputs.remote_host || vars.DEPLOY_REMOTE_HOST }}
          REMOTE_USER: ${{ inputs.remote_user != '' && inputs.remote_user || vars.DEPLOY_REMOTE_USER || 'root' }}
          REMOTE_PASS: ${{ secrets.DEPLOY_REMOTE_PASS }}
          DB_OPTION_FILE: ${{ inputs.db_option_file }}
        run: |
          test -n "$REMOTE_HOST" || { echo "Missing remote host. Set workflow input remote_host or repo variable DEPLOY_REMOTE_HOST."; exit 1; }
          test -n "$REMOTE_USER" || { echo "Missing remote user. Set workflow input remote_user or repo variable DEPLOY_REMOTE_USER."; exit 1; }
          test -n "$REMOTE_PASS" || { echo "Missing secret DEPLOY_REMOTE_PASS."; exit 1; }
          test -f "$DB_OPTION_FILE" || { echo "DbOption file not found: $DB_OPTION_FILE"; exit 1; }
          test -f "ci-artifacts/web_server" || { echo "Artifact ci-artifacts/web_server not found"; exit 1; }

      - name: Deploy web_server bundle
        env:
          REMOTE_HOST: ${{ inputs.remote_host != '' && inputs.remote_host || vars.DEPLOY_REMOTE_HOST }}
          REMOTE_USER: ${{ inputs.remote_user != '' && inputs.remote_user || vars.DEPLOY_REMOTE_USER || 'root' }}
          REMOTE_PASS: ${{ secrets.DEPLOY_REMOTE_PASS }}
          DB_OPTION_FILE: ${{ inputs.db_option_file }}
          BINARY_SOURCE: local
          BUILD_BINARY: 'false'
          LOCAL_BIN_OVERRIDE: ${{ github.workspace }}/ci-artifacts/web_server
        run: |
          chmod +x ./shells/deploy/deploy_web_server_bundle.sh
          ./shells/deploy/deploy_web_server_bundle.sh

      - name: Verify remote health via SSH
        env:
          REMOTE_HOST: ${{ inputs.remote_host != '' && inputs.remote_host || vars.DEPLOY_REMOTE_HOST }}
          REMOTE_USER: ${{ inputs.remote_user != '' && inputs.remote_user || vars.DEPLOY_REMOTE_USER || 'root' }}
          REMOTE_PASS: ${{ secrets.DEPLOY_REMOTE_PASS }}
        run: |
          sshpass -p "$REMOTE_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$REMOTE_USER@$REMOTE_HOST" \
            "set -e; \
             systemctl is-active web-server; \
             curl -fsS http://127.0.0.1:3100/api/health >/dev/null; \
             curl -fsS http://127.0.0.1:3100/api/projects >/dev/null"
