name: Multi-Platform Build

on:
  push:
    branches: [ "ci-multi-platform-build", "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTC_WRAPPER: ""

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure git for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
        shell: bash
      
      - name: Configure Cargo to use git CLI
        run: |
          mkdir -p ~/.cargo
          echo "[net]" >> ~/.cargo/config.toml
          echo "git-fetch-with-cli = true" >> ~/.cargo/config.toml
        shell: bash
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "multi-platform-${{ matrix.artifact_name }}"
          cache-on-failure: true
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential
      
      - name: Setup Windows build environment
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
      
      - name: Build web_server
        run: |
          cargo build --release --bin web_server --target ${{ matrix.target }} --no-default-features --features ws,sqlite-index,surreal-save,web_server
        shell: bash
      
      - name: Build library
        run: |
          cargo build --release --lib --target ${{ matrix.target }} --no-default-features --features ws,sqlite-index,surreal-save,web_server
        shell: bash
      
      - name: Package artifacts
        run: |
          mkdir -p release-package
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/web_server.exe release-package/
            cp target/${{ matrix.target }}/release/aios_database.dll release-package/ 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/web_server release-package/
            cp target/${{ matrix.target }}/release/libaios_database.* release-package/ 2>/dev/null || true
          fi
          echo "Build Date: $(date '+%Y-%m-%d %H:%M:%S')" > release-package/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> release-package/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> release-package/BUILD_INFO.txt
          echo "Target: ${{ matrix.target }}" >> release-package/BUILD_INFO.txt
        shell: bash
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release
          path: release-package/*
          retention-days: 30
