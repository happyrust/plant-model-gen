name: Multi-Platform Build

on:
  push:
    branches: [ "ci-multi-platform-build", "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTC_WRAPPER: ""

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure git for private repos
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
        shell: bash

      - name: Prepare local patch dependencies
        run: ./shells/prepare_ci_patch_deps.sh
        shell: bash
      
      - name: Setup git credentials
        run: |
          echo '#!/bin/bash' > /tmp/git-askpass.sh
          echo 'echo "${{ secrets.GH_PAT }}"' >> /tmp/git-askpass.sh
          chmod +x /tmp/git-askpass.sh
        shell: bash
      
      - name: Configure Cargo to use git CLI
        run: |
          mkdir -p ~/.cargo
          echo "[net]" >> ~/.cargo/config.toml
          echo "git-fetch-with-cli = true" >> ~/.cargo/config.toml
        shell: bash
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "multi-platform-${{ matrix.artifact_name }}"
          cache-on-failure: true
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential
      
      - name: Setup Windows build environment
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
      
      - name: Build web_server (standard)
        if: matrix.artifact_name != 'linux-x64'
        run: |
          cargo build --release --bin web_server --target ${{ matrix.target }} --no-default-features --features ws,sqlite-index,surreal-save,web_server
        shell: bash
        env:
          GIT_ASKPASS: /tmp/git-askpass.sh
          GIT_TERMINAL_PROMPT: 0
          GH_TOKEN: ${{ secrets.GH_PAT }}
      
      - name: Build web_server (Linux deploy-ready)
        if: matrix.artifact_name == 'linux-x64'
        run: |
          cargo build --release --bin web_server --target ${{ matrix.target }} --no-default-features --features ws,gen_model,manifold,project_hd,surreal-save,sqlite-index,web_server,parquet-export
        shell: bash
        env:
          GIT_ASKPASS: /tmp/git-askpass.sh
          GIT_TERMINAL_PROMPT: 0
          GH_TOKEN: ${{ secrets.GH_PAT }}
      
      - name: Build library
        run: |
          cargo build --release --lib --target ${{ matrix.target }} --no-default-features --features ws,sqlite-index,surreal-save,web_server
        shell: bash
        env:
          GIT_ASKPASS: /tmp/git-askpass.sh
          GIT_TERMINAL_PROMPT: 0
          GH_TOKEN: ${{ secrets.GH_PAT }}
      
      - name: Package artifacts
        run: |
          mkdir -p release-package
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/web_server.exe release-package/
            cp target/${{ matrix.target }}/release/aios_database.dll release-package/ 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/web_server release-package/
            cp target/${{ matrix.target }}/release/libaios_database.* release-package/ 2>/dev/null || true
          fi
          echo "Build Date: $(date '+%Y-%m-%d %H:%M:%S')" > release-package/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> release-package/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> release-package/BUILD_INFO.txt
          echo "Target: ${{ matrix.target }}" >> release-package/BUILD_INFO.txt
          if [ "${{ matrix.artifact_name }}" = "linux-x64" ]; then
            echo "Features: ws,gen_model,manifold,project_hd,surreal-save,sqlite-index,web_server,parquet-export" >> release-package/BUILD_INFO.txt
            echo "Deploy-Ready: true" >> release-package/BUILD_INFO.txt
          else
            echo "Features: ws,sqlite-index,surreal-save,web_server" >> release-package/BUILD_INFO.txt
            echo "Deploy-Ready: false" >> release-package/BUILD_INFO.txt
          fi
        shell: bash
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release
          path: release-package/*
          retention-days: 30

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: ./deploy-package
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts
          
          VERSION="${{ steps.version.outputs.VERSION }}"
          RELEASE_DIR="/opt/plant-model-gen/releases/$VERSION"
          
          ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST "mkdir -p $RELEASE_DIR"
          
          scp -i ~/.ssh/deploy_key deploy-package/web_server $PROD_USER@$PROD_HOST:$RELEASE_DIR/
          scp -i ~/.ssh/deploy_key deploy-package/BUILD_INFO.txt $PROD_USER@$PROD_HOST:$RELEASE_DIR/
          
          ssh -i ~/.ssh/deploy_key $PROD_USER@$PROD_HOST << 'ENDSSH'
            VERSION="${{ steps.version.outputs.VERSION }}"
            RELEASE_DIR="/opt/plant-model-gen/releases/$VERSION"
            CURRENT_LINK="/opt/plant-model-gen/current"
            ACTIVE_BIN="/root/web_server"
            
            chmod +x $RELEASE_DIR/web_server
            
            # Create symlink to output directory
            ln -sfn /root/output $RELEASE_DIR/output
            echo "Created symlink: $RELEASE_DIR/output -> /root/output"
            
            if [ -L "$CURRENT_LINK" ]; then
              PREV_RELEASE=$(readlink $CURRENT_LINK)
              echo "Previous release: $PREV_RELEASE"
            fi
            
            ln -sfn $RELEASE_DIR $CURRENT_LINK
            echo "Deployed version $VERSION to production"

            # 当前生产 systemd 仍通过 /root/web_server 启动，需同步覆盖活动二进制，
            # 避免仅切换 current 软链但实际服务仍跑旧版本。
            install -m 755 $RELEASE_DIR/web_server $ACTIVE_BIN
            echo "Updated active binary: $ACTIVE_BIN"
            
            sudo systemctl restart web-server
            sleep 5
            sudo systemctl is-active web-server
            curl -fsS http://127.0.0.1:3100/api/version
          ENDSSH
