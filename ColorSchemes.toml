# PDMS 标准配色方案配置文件
# 基于 IDA Pro 分析的原始 PDMS 系统配色规则

[schemes.standard_pdms]
name = "标准 PDMS 配色"
description = "与原始 PDMS 系统一致的标准配色方案"

# === 基础几何类型配色 ===
[schemes.standard_pdms.colors]
UNKOWN = [192, 192, 192, 255]  # 未知类型 - 浅灰色

# === 设备类型配色 ===
CE = [0, 100, 200, 180]        # 设备组件 - 深蓝色，半透明
EQUI = [255, 190, 0, 255]      # 设备 - 橙黄色

# === 管道系统配色 ===
PIPE = [255, 255, 0, 255]      # 管道 - 亮黄色 (标准管道颜色)
HANG = [255, 126, 0, 255]      # 悬挂件 - 橙红色

# === 结构系统配色 ===
STRU = [0, 150, 255, 255]      # 结构 - 青蓝色
SCTN = [188, 141, 125, 255]    # 截面 - 棕色
GENSEC = [188, 141, 125, 255]  # 通用截面 - 与 SCTN 相同

# === 建筑构件配色 ===
WALL = [150, 150, 150, 255]    # 墙体 - 中灰色
STWALL = [150, 150, 150, 255]  # 结构墙 - 与 WALL 相同
CWALL = [120, 120, 120, 255]   # 混凝土墙 - 深灰色
GWALL = [173, 216, 230, 128]   # 玻璃墙 - 浅蓝色，半透明

# === 地板和面板配色 ===
FLOOR = [210, 180, 140, 255]   # 地板 - 浅棕色
CFLOOR = [160, 130, 100, 255]  # 混凝土地板 - 深棕色
PANE = [220, 220, 220, 255]    # 面板 - 浅灰色

# === 空间和区域配色 ===
ROOM = [144, 238, 144, 100]    # 房间 - 浅绿色，半透明
AREADEF = [221, 160, 221, 80]  # 区域定义 - 浅紫色，半透明

# === 暖通空调配色 ===
HVAC = [175, 238, 238, 255]    # 暖通空调 - 浅蓝绿色

# === 几何操作配色 ===
EXTR = [147, 112, 219, 255]    # 拉伸体 - 紫色
REVO = [138, 43, 226, 255]     # 旋转体 - 深紫色

# === 特殊类型配色 ===
HANDRA = [255, 215, 0, 255]    # 扶手 - 金色
CWBRAN = [255, 140, 0, 255]    # 电缆桥架分支 - 深橙色
CTWALL = [176, 196, 222, 150]  # 幕墙 - 浅蓝色，半透明
DEMOPA = [255, 69, 0, 255]     # 演示面板 - 红色
INSURQ = [255, 182, 193, 255]  # 保温要求 - 粉色
STRLNG = [0, 255, 255, 255]    # 结构长度 - 青色

# 高对比度配色方案（用于可访问性）
