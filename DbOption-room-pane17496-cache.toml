# 仅用于“房间面板 PANE(dbnum=17496) -> foyer cache -> SQLite 空间索引”调试闭环
#
# 目标：
# - 只生成 PANE（房间面板）类型，避免全库生成
# - 仅走 cache（不写 SurrealDB），避免 inst_relate_aabb 大查询耗时
# - 生成 mesh 后，自动触发 output/spatial_index.sqlite 的增量更新（见 orchestrator.rs）

# 同步文件配置（保留字段）
total_sync = false
incr_sync = false
sync_history = false
enable_log = false
sync_graph_db = false
sync_versioned = false
sync_tidb = false
sync_live = false
replace_dbs = false
enable_index = false
sync_chunk_size = 100000

# 项目设置
project_path = "/Volumes/DPC/work/e3d_models"
included_projects = ["AvevaMarineSample", "AvevaCatalogue", "SCB", "ZDJ"]

mdb_name = "ALL"
project_name = "AvevaMarineSample"
project_code = "1516"
surreal_ns = "1516"
module = "DESI"

# 是否生成模型数据
gen_model = true
gen_mesh = true
replace_mesh = true
save_db = false
apply_boolean_operation = false
mesh_tol_ratio = 3.0

# 缓存/双路径对比配置（关键）
use_surrealdb = false
use_cache = true

# 是否启用房间计算（这里只做面板生成）
gen_spatial_tree = false
load_spatial_tree = false
save_spatial_tree_to_db = false

# 生成 SQLite 空间索引（output/spatial_index.sqlite）
enable_sqlite_rtree = true

gen_model_batch_size = 16

# Full Noun 模式配置：只生成房间面板（PANE）
full_noun_mode = true
full_noun_max_concurrent_nouns = 1
full_noun_batch_size = 200
full_noun_enabled_categories = ["PANE"]
full_noun_excluded_nouns = []
debug_limit_per_noun = 0

build_cate_relate = false

meshes_path = "./assets/meshes"
gen_noun_graph = false

# 只跑房间面板集中所在 dbno
#
# 注意：这里的 dbnum 是 SurrealDB/cache 的 dbnum，不是 refno 的 ref0。
# 例如 panel refno 为 17496/199296，但 ref0=17496 在 db_meta_info.json 映射到 dbnum=1112。
manual_db_nums = [1112]

# arangodb 配置（保留字段）
arangodb_database = "ams"
multi_threads = false
only_sync_sys = false
arangodb_url = "http://127.0.0.1:8529"
rebuild_ssc_tree = false
arangodb_user = "root"
arangodb_password = ""

# tidb 配置（保留字段）
ip = "127.0.0.1"
user = "root"
password = ""
port = "3306"
sql_threads_number = 10
batch_insert_sql_cnt = 100

# surrealdb 数据库配置（保留字段；use_surrealdb=false 时不写入，但 init_surreal 仍会被其他流程调用）
v_ip = "localhost"
v_port = 8020
v_user = "root"
v_password = "root"
pe_chunk = 300
att_chunk = 200

kv_ip = "localhost"
kv_port = "8010"

mqtt_host = "127.0.0.1"
mqtt_port = 1883

location = "sjz"
location_dbs = [251181]

server_release_ip = "127.0.0.1:9099"

remote_file_server_hosts = []
file_server_host = "http://localhost:8082/assets/archives"

surreal_script_dir = "../rs-core/resource/surreal"

room_keyword = "-RM"

# 调试选项（rs-core 的 DbOption 反序列化要求这些字段存在）
save_model_mesh_to_graph_db = true
need_sync_refno_basic = false
reset_mdb_project = false
only_update_dbinfo = false
debug_print_world_transform = false
only_rebuild_pdms_element = false

debug_refno_types = ["CATA", "LOOP", "PRIM"]
plat_url = ""

puhua_database_ip = ""
puhua_database_user = ""
puhua_database_password = ""

gen_history_model = false

[mesh_precision]
default_lod = "L1"

[mesh_precision.lod_profiles.L1]
neg_multiplier = 0.3
