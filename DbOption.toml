# 精度配置（已启用 LOD 分级）
[mesh_precision]
default_lod = "L1"

# 可根据 noun 或几何类型覆盖 LOD
# [mesh_precision.overrides.noun_lod]
# PIPE = "L2"
# VALVE = "L3"

# LOD L1 配置（低精度，快速预览）
[mesh_precision.lod_profiles.L1]
occ_linear_coeff = 2.0        # 较大的容差系数，生成更粗糙的网格（降低精度）
occ_linear_min = 2.0          # 最小容差（提高以降低精度）
occ_linear_max = 100.0         # 最大容差
neg_multiplier = 0.5           # 负实体容差倍数
sweep_multiplier = 0.2         # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.05    # 多面体固定容差
sphere_subdiv = 12             # 球体细分数（较少）
radial_segments = 16           # 径向分段数（较少，注意：当前未生效）
mesh_tol_ratio = 10.0           # 网格容差比率

[mesh_precision.lod_profiles.L1.csg_settings]
radial_segments = 12                # 基础圆周段数，最终段数会结合尺寸自适应
height_segments = 1                 # 基础高度段数
cap_segments = 1
error_tolerance = 0.01              # 解析几何允许的误差（用于阈值判断）
min_radial_segments = 12            # 尺寸自适应时的最小圆周段数
max_radial_segments = 18            # 尺寸自适应允许的最大圆周段数
min_height_segments = 1             # 尺寸自适应时的最小高度段数
max_height_segments = 2             # 尺寸自适应允许的最大高度段数
target_segment_length = 250.0       # mm，目标段长；大尺寸几何会细分至不超过该阈值
non_scalable_factor = 0.9           # 对于不可缩放几何的段长调整系数（<1 提高精度）

# LOD L2 配置（中等精度，平衡性能）
[mesh_precision.lod_profiles.L2]
occ_linear_coeff = 1.0        # 中等容差系数（降低精度）
occ_linear_min = 1.0        # 最小容差（提高以降低精度）
occ_linear_max = 80.0          # 最大容差
neg_multiplier = 0.4           # 负实体容差倍数
sweep_multiplier = 0.15        # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.02    # 多面体固定容差
sphere_subdiv = 18             # 球体细分数（中等）
radial_segments = 24           # 圆周分段基线（会结合尺寸自适应）
mesh_tol_ratio = 6.0           # 网格容差比率

[mesh_precision.lod_profiles.L2.csg_settings]
radial_segments = 20
height_segments = 2
cap_segments = 1
error_tolerance = 0.005
min_radial_segments = 12
max_radial_segments = 30
min_height_segments = 1
max_height_segments = 3
target_segment_length = 140.0
non_scalable_factor = 0.8

# LOD L3 配置（高精度，详细展示）
[mesh_precision.lod_profiles.L3]
occ_linear_coeff = 0.05        # 较小的容差系数，生成更精细的网格（降低精度）
occ_linear_min = 0.01         # 最小容差（提高以降低精度）
occ_linear_max = 50.0          # 最大容差
neg_multiplier = 0.3           # 负实体容差倍数
sweep_multiplier = 0.1         # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.01    # 多面体固定容差
sphere_subdiv = 32             # 球体细分数（较多）
radial_segments = 48           # 圆周分段基线（高精度，可与自适应组合）
mesh_tol_ratio = 3.0           # 网格容差比率

[mesh_precision.lod_profiles.L3.csg_settings]
radial_segments = 32
height_segments = 3
cap_segments = 1
error_tolerance = 0.002
min_radial_segments = 16
max_radial_segments = 60
min_height_segments = 2
max_height_segments = 6
target_segment_length = 80.0
non_scalable_factor = 0.7
