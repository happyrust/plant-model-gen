<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBJ Model Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; overflow: hidden; }
  .container { display: flex; width: 100vw; height: 100vh; }
  .panel { flex: 1; position: relative; border-right: 2px solid #333; }
  .panel:last-child { border-right: none; }
  .label {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 8px;
    font-size: 14px; z-index: 10; pointer-events: none;
  }
  .label.old { border: 2px solid #4CAF50; }
  .label.new { border: 2px solid #2196F3; }
  .stats {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; z-index: 10; line-height: 1.6;
  }
  canvas { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="panel" id="panel-old">
    <div class="label old">参考 OBJ (旧) — 126KB, 5组, 2766顶点</div>
    <div class="stats" id="stats-old"></div>
  </div>
  <div class="panel" id="panel-new">
    <div class="label new">新生成 OBJ — 47KB, 2组, 1038顶点</div>
    <div class="stats" id="stats-new"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

function createViewer(containerId, statsId) {
  const container = document.getElementById(containerId);
  const rect = container.getBoundingClientRect();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(50, rect.width / rect.height, 0.1, 10000);
  camera.position.set(5, 5, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(rect.width, rect.height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040, 2);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(10, 10, 10);
  scene.add(dirLight);
  const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
  dirLight2.position.set(-10, -5, -10);
  scene.add(dirLight2);

  // Grid
  const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
  scene.add(gridHelper);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const r = container.getBoundingClientRect();
    camera.aspect = r.width / r.height;
    camera.updateProjectionMatrix();
    renderer.setSize(r.width, r.height);
  });

  return { scene, camera, controls, statsId };
}

function loadOBJ(viewer, url, label) {
  const loader = new OBJLoader();
  fetch(url)
    .then(r => r.text())
    .then(text => {
      const obj = loader.parse(text);

      // Color groups differently
      const colors = [0x4CAF50, 0x2196F3, 0xFF9800, 0xE91E63, 0x9C27B0, 0x00BCD4];
      let groupIdx = 0;
      let totalVerts = 0, totalFaces = 0;
      const groups = [];

      obj.traverse(child => {
        if (child.isMesh) {
          const geo = child.geometry;
          const vCount = geo.attributes.position ? geo.attributes.position.count : 0;
          const fCount = geo.index ? geo.index.count / 3 : vCount / 3;
          totalVerts += vCount;
          totalFaces += Math.floor(fCount);
          groups.push(child.name || `group_${groupIdx}`);

          child.material = new THREE.MeshPhongMaterial({
            color: colors[groupIdx % colors.length],
            side: THREE.DoubleSide,
            flatShading: true,
            transparent: true,
            opacity: 0.85
          });

          // Wireframe overlay
          const wireframe = new THREE.WireframeGeometry(geo);
          const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.15, transparent: true });
          const lines = new THREE.LineSegments(wireframe, lineMat);
          child.add(lines);

          groupIdx++;
        }
      });

      // Center and scale
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 8 / maxDim;
      obj.scale.setScalar(scale);
      obj.position.sub(center.multiplyScalar(scale));

      viewer.scene.add(obj);
      viewer.camera.position.set(6, 4, 6);
      viewer.controls.target.set(0, 0, 0);

      // Stats
      const statsEl = document.getElementById(viewer.statsId);
      statsEl.innerHTML = `
        <b>${label}</b><br>
        顶点: ${totalVerts}<br>
        面: ${totalFaces}<br>
        组: ${groupIdx}<br>
        ${groups.map((g, i) => `<span style="color:${['#4CAF50','#2196F3','#FF9800','#E91E63','#9C27B0'][i % 5]}">${g}</span>`).join('<br>')}
      `;
    });
}

const viewerOld = createViewer('panel-old', 'stats-old');
const viewerNew = createViewer('panel-new', 'stats-new');

loadOBJ(viewerOld, 'output/AvevaMarineSample/17496_106028-old.obj', '参考模型 (旧)');
loadOBJ(viewerNew, 'output/AvevaMarineSample/17496_106028.obj', '新生成模型');

// Sync cameras
function syncCamera(src, dst) {
  src.controls.addEventListener('change', () => {
    dst.camera.position.copy(src.camera.position);
    dst.camera.rotation.copy(src.camera.rotation);
    dst.controls.target.copy(src.controls.target);
  });
}
syncCamera(viewerOld, viewerNew);
syncCamera(viewerNew, viewerOld);
</script>
</body>
</html>
