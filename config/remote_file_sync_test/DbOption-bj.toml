# exclude_db_nums = [] #不参与生成模型的数据库编号
plat_url = ""

#puhua
puhua_database_ip = ""
puhua_database_user = ""
puhua_database_password = ""


# room_keyword = "-RM" # 2016  K-R-K100   (-R-)
room_keyword = "-R-" # 2016  K-R-K100   (-R-)

