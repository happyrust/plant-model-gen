# BJ 区域 DbOption 配置（远程文件同步测试专用）
# 基本结构拷贝自根目录 DbOption.toml，仅调整项目路径、location、location_dbs、MQTT 与 file_server_host

#同步文件配置
total_sync = false
incr_sync =  false
sync_history = false
enable_log = false
sync_graph_db = false
sync_versioned = false
sync_tidb = false
sync_live = true
replace_dbs = false
enable_index = false
sync_chunk_size = 10_0000

#项目设置
# 原始示例: /Volumes/DPC/work/e3d_models
project_path = "/Volumes/DPC/work/e3d_models/test_bj"
# included_projects = ["AvevaMarineSample", "AvevaCatalogue", "SCB", "ZDJ"]
included_projects = ["AvevaMarineSample", "AvevaCatalogue", "SCB", "ZDJ"]
#project_dirs = ["AvevaMarineSample"]

mdb_name = "ALL"
project_name = "AvevaMarineSample"
project_code = '1516'
surreal_ns = '1516'
module = "DESI"
#是否生成模型数据
gen_model = true
gen_mesh = true
replace_mesh = false
save_db = true
apply_boolean_operation = true
mesh_tol_ratio = 3.0
#是否启用房间计算
gen_spatial_tree = true
load_spatial_tree = false
save_spatial_tree_to_db = false
gen_model_batch_size = 16

# Full Noun 模式配置
full_noun_mode = true
full_noun_max_concurrent_nouns = 6
full_noun_batch_size = 200

# 启用的 noun 类别/具体 noun 名称
# 可选值: "cate", "loop", "prim" 或具体 noun 名称如 "BRAN", "PANE"
# 空 vec 表示启用所有类别（默认行为）
# 示例1: 只生成 BRAN 和 PANE 类型
full_noun_enabled_categories = ["BRAN", "PANE"]

# 排除的 noun 列表
# 即使类别启用，这里的 noun 也会被过滤掉
full_noun_excluded_nouns = []

# 调试模式：限制每种 Noun 类型的处理数量
# 设置为 10 表示只处理每种类型的前 10 个实例
# 注释掉或设置为 0 表示不限制
debug_limit_per_noun = 10

build_cate_relate = false

meshes_path = "/Volumes/DPC/work/plant-code/rs-plant3-d/assets/meshes"

#生成补充类型的graph，方便查询直接生成语句
gen_noun_graph = false

#arangodb 配置
arangodb_database = "ams"
multi_threads = false
only_sync_sys = false
arangodb_url = "http://127.0.0.1:8529"
rebuild_ssc_tree = false
arangodb_user = "root"
arangodb_password = ""

#tidb 配置
ip = "127.0.0.1"
user = "root"
password = ""
port = "3306"
#port = "4000"
sql_threads_number = 10
batch_insert_sql_cnt = 100 #mysql 批量插入的数量


#版本数据库服务配置
v_ip = "localhost"
v_port = 8020
v_user = "root"
v_password = "root"
pe_chunk = 300
att_chunk = 200

kv_ip = "localhost"
kv_port = "8010"


#mqtt 事件 ip（测试环境使用本机 + 内置 MQTT 服务器）
mqtt_host = "127.0.0.1"
mqtt_port = 1883

# 区域标识与本地区负责的 dbnums（示例：251270 属于 BJ）
location = "bj"
location_dbs = [251270]

#服务器启动配置
server_release_ip = "127.0.0.1:9099"

# hash文件的站点
remote_file_server_hosts = []
# BJ 侧文件服务器入口（web_server 静态目录挂载到 /assets/archives）
file_server_host = "http://localhost:8081/assets/archives"

surreal_script_dir = "../rs-core/resource/surreal"


#调试选项
save_model_mesh_to_graph_db = true
need_sync_refno_basic = false       #是否重新生成 refno_basic 缓存
reset_mdb_project = false           #是否重新生成 mdb 缓存
only_update_dbinfo = false
debug_print_world_transform = false
only_rebuild_pdms_element = false

debug_refno_types = ["CATA", "LOOP", "PRIM"]
# debug_refno_types = ["LOOP", "PRIM"]
# included_db_files = ["ams1112_0001"]
#included_db_files = ["zdj7600_0001"]
