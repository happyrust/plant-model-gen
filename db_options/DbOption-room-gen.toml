# 同步文件配置
total_sync = false
incr_sync = false
sync_history = false
enable_log = false
sync_graph_db = false
sync_versioned = false
sync_tidb = false
sync_live = false
replace_dbs = false
enable_index = false
sync_chunk_size = 10_0000

# 项目设置
project_path = "/Volumes/DPC/work/e3d_models"
included_projects = ["AvevaMarineSample", "AvevaCatalogue", "SCB", "ZDJ"]

mdb_name = "ALL"
project_name = "AvevaMarineSample"
project_code = '1516'
surreal_ns = '1516'
module = "DESI"

# 是否生成模型数据
gen_model = true
gen_mesh = true
replace_mesh = true
save_db = true
apply_boolean_operation = false
mesh_tol_ratio = 3.0

# 是否启用房间计算（此配置用于“先生成，再单独计算”，这里先关）
gen_spatial_tree = false
load_spatial_tree = false
save_spatial_tree_to_db = false

enable_sqlite_rtree = true
gen_model_batch_size = 16

# IndexTree 默认管线调优配置：只生成房间相关面板 + 管道分支，避免全库跑
index_tree_max_concurrent_targets = 1
index_tree_batch_size = 200

# 启用的 noun 类别/具体 noun 名称
# 这里用“具体 noun 名称”模式，确保只处理 PANE/BRAN
index_tree_enabled_target_types = ["PANE", "BRAN"]
index_tree_excluded_target_types = []

# 0 表示不限制（生成全部）
index_tree_debug_limit_per_target_type = 0

build_cate_relate = false

meshes_path = "./assets/meshes"
gen_noun_graph = false

# 仅生成/计算与房间和目标构件相关的 dbno，避免全库跑
manual_db_nums = [17496, 24383, 25688]

# arangodb 配置（保留字段）
arangodb_database = "ams"
multi_threads = false
only_sync_sys = false
arangodb_url = "http://127.0.0.1:8529"
rebuild_ssc_tree = false
arangodb_user = "root"
arangodb_password = ""

# tidb 配置（保留字段）
ip = "127.0.0.1"
user = "root"
password = ""
port = "3306"
sql_threads_number = 10
batch_insert_sql_cnt = 100

# surrealdb 数据库配置
v_ip = "localhost"
v_port = 8020
v_user = "root"
v_password = "root"
pe_chunk = 300
att_chunk = 200

kv_ip = "localhost"
kv_port = "8010"

mqtt_host = "127.0.0.1"
mqtt_port = 1883

location = "sjz"
location_dbs = [251181]

server_release_ip = "127.0.0.1:9099"

remote_file_server_hosts = []
file_server_host = "http://localhost:8082/assets/archives"

surreal_script_dir = "../rs-core/resource/surreal"

room_keyword = "-RM"

# 调试选项（rs-core 的 DbOption 反序列化要求这些字段存在）
save_model_mesh_to_graph_db = true
need_sync_refno_basic = false
reset_mdb_project = false
only_update_dbinfo = false
debug_print_world_transform = false
only_rebuild_pdms_element = false

debug_refno_types = ["CATA", "LOOP", "PRIM"]
plat_url = ""

# puhua（保留字段）
puhua_database_ip = ""
puhua_database_user = ""
puhua_database_password = ""

gen_history_model = false

# 精度配置（LOD 分级）
