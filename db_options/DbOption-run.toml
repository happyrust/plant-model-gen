total_sync = false
replace_dbs = false
incr_sync = false
sync_history = false
enable_log = true
sync_graph_db = true
sync_versioned = false
sync_tidb = false
sync_live = false
enable_index = false
sync_chunk_size = 10_0000

# 项目设置
# project_path = "D:/AVEVA/Projects/E3D2.1"
project_path = "/Volumes/DPC/work/e3d_models"
included_projects = ["AvevaMarineSample", "AvevaCatalogue", "SCB", "ZDJ"]

mdb_name = "ALL"
project_name = "AvevaMarineSample"
project_code = '1516'
surreal_ns = '1516'
module = "DESI"

# 是否生成模型数据
gen_model = true
gen_mesh = true
replace_mesh = true
save_db = false

# 运行期：仍可连接 DB，但输出/缓存目录改到 C 盘，避免 D 盘空间不足导致失败
use_surrealdb = false
use_cache = true

# 解析期只生成 scene tree 文件，跳过 PE/属性数据保存
gen_tree_only = false
apply_boolean_operation = true
mesh_tol_ratio = 3.0

# 是否启用房间计算（本次 debug-model/导出不需要，关闭以减少磁盘写入）
gen_spatial_tree = false
load_spatial_tree = false
save_spatial_tree_to_db = false
enable_sqlite_rtree = false
gen_model_batch_size = 16

# IndexTree 默认管线调优配置
index_tree_max_concurrent_targets = 6
index_tree_batch_size = 200

# 启用的 noun 类别/具体 noun 名称
# 可选值: "cate", "loop", "prim" 或具体 noun 名称如 "BRAN", "PANE"
# 空 vec 表示启用所有类别（默认行为）
# 房间相关类型: FRMW(框架), SBFR(子框架), PANE(面板)
index_tree_enabled_target_types = ["PANE", "BRAN", "HANG"]

# 调试模式：限制每种 Noun 类型的处理数量
index_tree_debug_limit_per_target_type = 0

build_cate_relate = false

# 关键：将 meshes 输出指到 C 盘
meshes_path = "C:/aios_run/meshes"

# 生成补充类型的graph，方便查询直接生成语句
gen_noun_graph = false

# arangodb 配置
arangodb_database = "ams"
multi_threads = false
only_sync_sys = false
arangodb_url = "http://127.0.0.1:8529"
rebuild_ssc_tree = false
arangodb_user = "root"
arangodb_password = ""

