# 精度配置（LOD 分级：数字越大，几何更粗，用于远距渲染）
[mesh_precision]
default_lod = "L1"

# 可根据 noun 或几何类型覆盖 LOD
# [mesh_precision.overrides.noun_lod]
# PIPE = "L3"
# VALVE = "L4"

# L1 配置（高精度，近距离渲染）
[mesh_precision.lod_profiles.L1]
neg_multiplier = 0.3        # 负实体容差倍数
sweep_multiplier = 0.1      # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.01 # 多面体固定容差
sphere_subdiv = 32          # 球体细分数（较多）
radial_segments = 48        # 径向分段数（较多）
mesh_tol_ratio = 3.0        # 网格容差比率

[mesh_precision.lod_profiles.L1.csg_settings]
radial_segments = 32         # 基础圆周段数，最终段数会结合尺寸自适应
height_segments = 3          # 基础高度段数
cap_segments = 1
error_tolerance = 0.002      # 解析几何允许的误差（用于阈值判断）
min_radial_segments = 16     # 尺寸自适应时的最小圆周段数
max_radial_segments = 60     # 尺寸自适应允许的最大圆周段数
min_height_segments = 2      # 尺寸自适应时的最小高度段数
max_height_segments = 6      # 尺寸自适应允许的最大高度段数
target_segment_length = 80.0 # mm，目标段长；小尺寸几何会细分至不超过该阈值
non_scalable_factor = 0.7    # 对于不可缩放几何的段长调整系数（<1 提高精度）

# L2 配置（中等精度，中距离渲染）
[mesh_precision.lod_profiles.L2]
neg_multiplier = 0.4        # 负实体容差倍数
sweep_multiplier = 0.15     # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.02 # 多面体固定容差
sphere_subdiv = 18          # 球体细分数（中等）
radial_segments = 24        # 径向分段数（中等）
mesh_tol_ratio = 6.0        # 网格容差比率

[mesh_precision.lod_profiles.L2.csg_settings]
radial_segments = 20
height_segments = 2
cap_segments = 1
error_tolerance = 0.005
min_radial_segments = 12
max_radial_segments = 30
min_height_segments = 1
max_height_segments = 3
target_segment_length = 140.0
non_scalable_factor = 0.8

# L3 配置（低精度，远距离渲染）
[mesh_precision.lod_profiles.L3]
neg_multiplier = 0.5        # 负实体容差倍数
sweep_multiplier = 0.2      # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.05 # 多面体固定容差
sphere_subdiv = 12          # 球体细分数（较少）
radial_segments = 16        # 径向分段数（较少）
mesh_tol_ratio = 10.0       # 网格容差比率

[mesh_precision.lod_profiles.L3.csg_settings]
radial_segments = 12
height_segments = 1
cap_segments = 1
error_tolerance = 0.01
min_radial_segments = 12
max_radial_segments = 18
min_height_segments = 1
max_height_segments = 2
target_segment_length = 250.0
non_scalable_factor = 0.9

# L4 配置（极低精度，超远距离渲染）
[mesh_precision.lod_profiles.L4]
neg_multiplier = 0.6       # 负实体容差倍数
sweep_multiplier = 0.3     # 拉伸/旋转体容差倍数
polyhedron_fixed_tol = 0.1 # 多面体固定容差
sphere_subdiv = 8          # 球体细分数（极少）
radial_segments = 8        # 径向分段数（极少）
mesh_tol_ratio = 15.0      # 网格容差比率

[mesh_precision.lod_profiles.L4.csg_settings]
radial_segments = 8
height_segments = 1
cap_segments = 1
error_tolerance = 0.02
min_radial_segments = 6
max_radial_segments = 12
min_height_segments = 1
max_height_segments = 1
target_segment_length = 400.0
non_scalable_factor = 1.0

