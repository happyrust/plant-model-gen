# DuckDB Range Requests 配置
#
# 将此配置添加到 Nginx server block 中
# 支持 DuckDB-WASM 虚拟化读取

location /files/web_duckdb/ {
    # 根据实际部署路径修改
    alias /path/to/gen-model-fork/assets/web_duckdb/;
    
    # 启用 Range Requests (必需)
    add_header Accept-Ranges bytes always;
    
    # CORS 配置 (跨域访问)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
    
    # 缓存控制
    # DuckDB 文件带时间戳，可长期缓存
    add_header Cache-Control "public, max-age=31536000" always;
    
    # latest.json 不缓存，确保获取最新版本
    location ~ /latest\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Accept-Ranges bytes always;
        add_header Access-Control-Allow-Origin * always;
    }
    
    # 处理 OPTIONS 预检请求 (CORS)
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }
}

# 可选：GLB mesh 文件服务
location /files/meshes/ {
    alias /path/to/gen-model-fork/assets/meshes/;
    
    add_header Accept-Ranges bytes always;
    add_header Access-Control-Allow-Origin * always;
    add_header Cache-Control "public, max-age=31536000" always;
}
