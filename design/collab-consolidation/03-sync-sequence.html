<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>异地协同 · 同步时序图</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf7f2;--paper-2:#f5f1e9;--ink:#1c1917;--muted:#52534e;
    --soft:#94928c;--rule:rgba(28,25,23,0.12);
    --accent:#b5523a;--link:#1a70c7;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:48px 32px 64px;background:var(--paper);color:var(--ink);
    font-family:'Geist','PingFang SC',sans-serif;font-size:14px;line-height:1.55}
  .wrap{max-width:1200px;margin:0 auto}
  .eyebrow{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:40px;
    line-height:1.1;margin:0 0 8px;letter-spacing:-0.01em}
  .sub{color:var(--muted);margin:0 0 36px;max-width:720px}
  .diagram{background:var(--paper-2);border:1px solid var(--rule);border-radius:8px;
    padding:24px;overflow-x:auto}
  .diagram svg{display:block;margin:0 auto}
  .footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--rule);
    color:var(--soft);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Collaboration · Sync · Sequence</p>
  <h1>异地同步核心时序</h1>
  <p class="sub">源端文件变化 → 增量检测 → 压缩打包 → MQTT 广播 → 任务入队 → Worker 执行 → 目标站点接收 → 状态回写。来源参考 <code>web-server/异地更新流程图.md</code>，精炼成 5 lifeline · 12 message。</p>

  <div class="diagram">
<svg viewBox="0 0 1160 720" width="1160" height="720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="rgba(28,25,23,0.07)"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#52534e"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a70c7"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f5f1e9"/>
  <rect width="100%" height="100%" fill="url(#dots)" opacity="0.5"/>

  <!-- 5 Lifelines -->
  <!-- Lifeline X positions: 140, 380, 620, 860, 1060 -->
  <!-- Heads y=90, lifeline extends to y=640 -->

  <!-- Head: Source FS -->
  <rect x="72" y="72" width="136" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#52534e" stroke-width="1"/>
  <text x="140" y="90" fill="#1c1917" font-family="'Geist',sans-serif" font-size="12" font-weight="600" text-anchor="middle">源端文件系统</text>
  <text x="140" y="104" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" text-anchor="middle">PDMS data/**/*.db</text>
  <line x1="140" y1="112" x2="140" y2="640" stroke="rgba(28,25,23,0.30)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Head: Watcher (FOCAL) -->
  <rect x="312" y="72" width="136" height="40" rx="6" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1.2"/>
  <text x="380" y="90" fill="#1c1917" font-family="'Geist',sans-serif" font-size="12" font-weight="600" text-anchor="middle">Watcher</text>
  <text x="380" y="104" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" text-anchor="middle">AiosDBManager</text>
  <line x1="380" y1="112" x2="380" y2="640" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Head: SyncControl (FOCAL) -->
  <rect x="552" y="72" width="136" height="40" rx="6" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1.2"/>
  <text x="620" y="90" fill="#1c1917" font-family="'Geist',sans-serif" font-size="12" font-weight="600" text-anchor="middle">SyncControl</text>
  <text x="620" y="104" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" text-anchor="middle">queue + worker</text>
  <line x1="620" y1="112" x2="620" y2="640" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Head: MQTT Broker -->
  <rect x="792" y="72" width="136" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#52534e" stroke-width="1"/>
  <text x="860" y="90" fill="#1c1917" font-family="'Geist',sans-serif" font-size="12" font-weight="600" text-anchor="middle">MQTT Broker</text>
  <text x="860" y="104" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" text-anchor="middle">Sync/E3d topic</text>
  <line x1="860" y1="112" x2="860" y2="640" stroke="rgba(28,25,23,0.30)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Head: Target Site -->
  <rect x="992" y="72" width="136" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#52534e" stroke-width="1"/>
  <text x="1060" y="90" fill="#1c1917" font-family="'Geist',sans-serif" font-size="12" font-weight="600" text-anchor="middle">目标站点</text>
  <text x="1060" y="104" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" text-anchor="middle">HTTP PUT / Local</text>
  <line x1="1060" y1="112" x2="1060" y2="640" stroke="rgba(28,25,23,0.30)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ================ MESSAGES ================ -->

  <!-- M1: FS → Watcher: notify event -->
  <line x1="140" y1="160" x2="376" y2="160" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="188" y="148" width="140" height="12" rx="2" fill="#f5f1e9"/>
  <text x="258" y="157" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">1 · FILE MODIFY / CREATE</text>

  <!-- M2: Watcher self-call: parse + compare sesno -->
  <path d="M 380 192 C 440 192, 440 220, 380 220" fill="none" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="398" y="198" width="100" height="12" rx="2" fill="#f5f1e9"/>
  <text x="448" y="207" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">2 · PARSE SESNO</text>

  <!-- M3: Watcher self-call: collect_increment_eles + .cba (FOCAL) -->
  <path d="M 380 252 C 440 252, 440 280, 380 280" fill="none" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="398" y="258" width="108" height="12" rx="2" fill="#f5f1e9"/>
  <text x="452" y="267" fill="#b5523a" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">3 · PACK .CBA</text>

  <!-- M4: Watcher → MQTT: publish Sync/E3d -->
  <line x1="380" y1="312" x2="856" y2="312" stroke="#1a70c7" stroke-width="1.2" marker-end="url(#arrow-link)"/>
  <rect x="550" y="300" width="140" height="12" rx="2" fill="#f5f1e9"/>
  <text x="620" y="309" fill="#1a70c7" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">4 · MQTT PUBLISH · QOS2</text>

  <!-- M5: Watcher → SyncControl: enqueue_tasks (FOCAL) -->
  <line x1="380" y1="348" x2="616" y2="348" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="430" y="336" width="140" height="12" rx="2" fill="#f5f1e9"/>
  <text x="500" y="345" fill="#b5523a" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">5 · ENQUEUE TASKS</text>

  <!-- M6: SyncControl self-call: Worker get_next_task -->
  <path d="M 620 380 C 680 380, 680 408, 620 408" fill="none" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="638" y="386" width="100" height="12" rx="2" fill="#f5f1e9"/>
  <text x="688" y="395" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">6 · NEXT TASK</text>

  <!-- M7: SyncControl → Target: HTTP PUT / copy (FOCAL) -->
  <line x1="620" y1="440" x2="1056" y2="440" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <rect x="780" y="428" width="120" height="12" rx="2" fill="#f5f1e9"/>
  <text x="840" y="437" fill="#b5523a" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">7 · TRANSFER FILE</text>

  <!-- M8: Target → SyncControl: ack / error -->
  <line x1="1060" y1="476" x2="624" y2="476" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
  <rect x="808" y="464" width="100" height="12" rx="2" fill="#f5f1e9"/>
  <text x="858" y="473" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">8 · ACK / ERROR</text>

  <!-- M9: SyncControl self-call: complete_task + retry -->
  <path d="M 620 508 C 680 508, 680 536, 620 536" fill="none" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="638" y="514" width="136" height="12" rx="2" fill="#f5f1e9"/>
  <text x="706" y="523" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">9 · COMPLETE · RETRY</text>

  <!-- M10: SyncControl → MQTT: subscribe update (downstream) -->
  <line x1="860" y1="568" x2="624" y2="568" stroke="#1a70c7" stroke-width="1.2" marker-end="url(#arrow-link)" stroke-dasharray="5,4"/>
  <rect x="680" y="556" width="140" height="12" rx="2" fill="#f5f1e9"/>
  <text x="750" y="565" fill="#1a70c7" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">10 · TARGET MQTT ACK</text>

  <!-- M11: SyncControl → (SSE broadcast to frontend) -->
  <line x1="620" y1="604" x2="140" y2="604" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="290" y="592" width="180" height="12" rx="2" fill="#f5f1e9"/>
  <text x="380" y="601" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em" text-anchor="middle">11 · SSE SYNCCOMPLETED → UI</text>

  <!-- ================ Legend strip ================ -->
  <line x1="32" y1="662" x2="1128" y2="662" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
  <text x="32" y="682" fill="#52534e" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.14em">LEGEND</text>

  <line x1="120" y1="677" x2="156" y2="677" stroke="#52534e" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="164" y="680" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">同步调用</text>

  <line x1="260" y1="677" x2="296" y2="677" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
  <text x="304" y="680" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">核心路径</text>

  <line x1="400" y1="677" x2="436" y2="677" stroke="#1a70c7" stroke-width="1.2" marker-end="url(#arrow-link)"/>
  <text x="444" y="680" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">MQTT 通道</text>

  <line x1="552" y1="677" x2="588" y2="677" stroke="#52534e" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="596" y="680" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">返回 / 异步</text>

  <rect x="720" y="672" width="14" height="10" rx="2" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1"/>
  <text x="740" y="680" fill="#52534e" font-family="'Geist Mono',monospace" font-size="9" letter-spacing="0.06em">焦点 lifeline · Watcher + SyncControl</text>

</svg>
  </div>

  <p class="footer">design/collab-consolidation/03-sync-sequence.html · plant-model-gen · 2026-04-22</p>
</div>
</body>
</html>
