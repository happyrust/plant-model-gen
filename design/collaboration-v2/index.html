<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>异地协同 · v2 · Hi-Fi 原型</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

<style>
:root{
  --bg:#FAFAF7;
  --ink-900:#0F172A;
  --ink-700:#334155;
  --ink-500:#64748B;
  --ink-400:#94A3B8;
  --ink-300:#CBD5E1;
  --line:#E6E4DE;
  --line-soft:#EFEDE7;
  --brand:#1F3A68;
  --brand-strong:#152846;
  --brand-soft:#E8EDF3;
  --ok:oklch(0.68 0.14 150);
  --ok-bg:oklch(0.96 0.04 150);
  --warn:oklch(0.72 0.16 75);
  --warn-bg:oklch(0.96 0.05 80);
  --bad:oklch(0.62 0.20 25);
  --bad-bg:oklch(0.96 0.04 25);
  --radius:10px;
  --font-display:"EB Garamond","Noto Serif SC","Source Serif Pro",serif;
  --font-body:-apple-system,"Segoe UI","PingFang SC",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
[data-theme="dark"]:root,
[data-theme="dark"]{
  --bg:#0D1117;
  --ink-900:#E6EDF3;
  --ink-700:#B1BAC4;
  --ink-500:#7D8590;
  --ink-400:#656D76;
  --ink-300:#3D444D;
  --line:#30363D;
  --line-soft:#21262D;
  --brand:#7AA2E3;
  --brand-strong:#A9C4F2;
  --brand-soft:#1B2A46;
  --ok:oklch(0.78 0.16 150);
  --ok-bg:oklch(0.24 0.06 150);
  --warn:oklch(0.82 0.17 75);
  --warn-bg:oklch(0.28 0.08 75);
  --bad:oklch(0.72 0.22 25);
  --bad-bg:oklch(0.26 0.09 25);
}
[data-theme="dark"] body{background:var(--bg);color:var(--ink-900)}
[data-theme="dark"] .ic-kpi,
[data-theme="dark"] .ic-panel,
[data-theme="dark"] .ic-tbl tbody tr:hover,
[data-theme="dark"] .ic-active-card,
[data-theme="dark"] .ic-fail-list,
[data-theme="dark"] .ic-drawer,
[data-theme="dark"] .ic-drw-card,
[data-theme="dark"] .ic-drw-meta-grid .m,
[data-theme="dark"] .ic-drw-diag,
[data-theme="dark"] .ic-cfg-row,
[data-theme="dark"] .ic-toast,
[data-theme="dark"] .ic-menu,
[data-theme="dark"] .ic-icon-btn,
[data-theme="dark"] .ic-btn:not(.ic-btn-primary),
[data-theme="dark"] .ic-side-search,
[data-theme="dark"] .ic-log-filters select,
[data-theme="dark"] .ic-log-filters input,
[data-theme="dark"] .ic-cfg-row input,
[data-theme="dark"] .ic-drw-close,
[data-theme="dark"] .ic-grp{background:#151B23}
[data-theme="dark"] .ic-sidebar{background:#0F141A}
[data-theme="dark"] .ic-grp.active,
[data-theme="dark"] .ic-tbl tbody tr.active{background:var(--brand-soft)}
[data-theme="dark"] .ic-topo-canvas{background:
  linear-gradient(#151B23,#151B23),
  repeating-linear-gradient(0deg,transparent 0 47px,rgba(230,237,243,.04) 47px 48px),
  repeating-linear-gradient(90deg,transparent 0 47px,rgba(230,237,243,.04) 47px 48px);
  background-blend-mode:normal,multiply,multiply}
[data-theme="dark"] .ic-node-box{fill:#1C2530}
[data-theme="dark"] .ic-node.self .ic-node-box{fill:var(--brand-soft)}
[data-theme="dark"] .ic-segctl{background:#0F141A}
[data-theme="dark"] .ic-segctl button.on{background:#1C2530}
[data-theme="dark"] .ic-chart-tip{background:var(--ink-900);color:var(--bg)}
[data-theme="dark"] .ic-chart-tip::after{border-top-color:var(--ink-900)}
[data-theme="dark"] .ic-empty{color:var(--ink-400)}
[data-theme="dark"] .ic-active-card.pending{border-color:var(--ink-300)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink-900);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.mono,.ic-tbl .mono,.ic-grp-row3 .m,.ic-meta-time,.ic-log-filters input,.ic-drw-kv dd.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* === 指挥条 === */
.ic-cmdbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:16px;height:60px;padding:0 28px;background:var(--bg);border-bottom:1px solid var(--line)}
.ic-crumb{display:flex;align-items:center;gap:10px;color:var(--ink-500);font-size:13px}
.ic-crumb .curr{color:var(--ink-900);font-weight:500}
.ic-crumb .sep{color:var(--ink-300)}
.ic-statuspill{display:inline-flex;align-items:center;gap:8px;padding:4px 12px 4px 10px;border-radius:999px;font-size:12px;font-weight:500;letter-spacing:.01em}
.ic-statuspill .dot{width:8px;height:8px;border-radius:999px;background:currentColor}
.ic-statuspill.ok{background:var(--ok-bg);color:var(--ok)}
.ic-statuspill.warn{background:var(--warn-bg);color:var(--warn)}
.ic-statuspill.bad{background:var(--bad-bg);color:var(--bad)}
.ic-live{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:999px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;font-weight:500;border:1px solid transparent}
.ic-live.on{background:var(--ok-bg);color:var(--ok);border-color:color-mix(in oklch, var(--ok) 25%, transparent)}
.ic-live.off{background:var(--bad-bg);color:var(--bad)}
.ic-live .ping{position:relative;display:inline-block;width:8px;height:8px}
.ic-live .ping::before{content:"";position:absolute;inset:0;border-radius:999px;background:currentColor;opacity:.75;animation:ic-ping 1.6s cubic-bezier(0,0,.2,1) infinite}
.ic-live .ping::after{content:"";position:absolute;inset:0;border-radius:999px;background:currentColor}
@keyframes ic-ping{75%,100%{transform:scale(2.2);opacity:0}}
.ic-cmdbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ic-meta-time{color:var(--ink-400);font-size:12px;font-family:var(--font-mono);margin-right:4px}
.ic-icon-btn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;color:var(--ink-500);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s}
.ic-icon-btn:hover{border-color:var(--ink-400);color:var(--ink-900)}
.ic-icon-btn.active{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.ic-btn{height:34px;display:inline-flex;align-items:center;gap:7px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--ink-700);cursor:pointer;transition:border-color .15s,background .15s}
.ic-btn:hover{border-color:var(--ink-400)}
.ic-btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.ic-btn-primary:hover{background:var(--brand-strong);border-color:var(--brand-strong)}
.ic-btn-more{width:34px;justify-content:center;padding:0}
.ic-menu{position:absolute;top:46px;right:28px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px;min-width:180px;box-shadow:0 8px 24px rgba(15,23,42,.08);z-index:20}
.ic-menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;font-size:13px;color:var(--ink-700);cursor:pointer}
.ic-menu-item:hover{background:var(--brand-soft);color:var(--brand)}
.ic-menu-item.danger{color:var(--bad)}
.ic-menu-item.danger:hover{background:var(--bad-bg)}
.ic-menu-sep{height:1px;background:var(--line);margin:4px 6px}

/* === 整体 2 列布局 === */
.ic-shell{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 60px)}
.ic-sidebar{border-right:1px solid var(--line);padding:20px 16px;background:#FCFBF8}
.ic-main{padding:22px 28px 80px 28px;min-width:0}

/* === 左栏 协同组 === */
.ic-side-title{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--ink-500);text-transform:uppercase;letter-spacing:.1em;margin:0 0 12px 4px}
.ic-side-search{display:flex;align-items:center;gap:8px;padding:0 10px;height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;margin-bottom:8px}
.ic-side-search input{flex:1;border:0;outline:0;font-size:13px;background:transparent;color:var(--ink-900)}
.ic-side-actions{display:flex;gap:6px;margin:6px 0 14px}
.ic-side-actions .ic-btn{flex:1;height:32px;padding:0 10px;font-size:12px}
.ic-grp-list{display:flex;flex-direction:column;gap:6px}
.ic-grp{position:relative;display:block;padding:12px 12px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;transition:border-color .15s,background .15s}
.ic-grp:hover{border-color:var(--ink-300)}
.ic-grp.active{border-color:var(--brand);background:var(--brand-soft)}
.ic-grp-row1{display:flex;align-items:center;gap:8px}
.ic-grp-name{font-weight:500;color:var(--ink-900);font-size:13.5px}
.ic-grp-stamp{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-500);letter-spacing:.05em;padding:2px 6px;border:1px dashed var(--ink-300);border-radius:4px;transform:rotate(-1.5deg)}
.ic-grp.active .ic-grp-stamp{color:var(--brand);border-color:var(--brand)}
.ic-grp-loc{margin-top:4px;font-size:12px;color:var(--ink-500)}
.ic-grp-row3{margin-top:9px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-400)}
.ic-grp-row3 .m{font-family:var(--font-mono);font-size:10.5px}

/* === 右主区 === */
.ic-hero{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:20px}
.ic-hero h1{font-family:var(--font-display);font-weight:500;font-size:40px;line-height:1.05;margin:0;letter-spacing:-.02em}
.ic-hero h1 em{font-style:italic;color:var(--brand);font-weight:500}
.ic-hero p{margin:8px 0 0;color:var(--ink-500);font-size:13.5px;max-width:560px}
.ic-hero-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;color:var(--ink-500);font-size:12.5px}
.ic-hero-meta strong{color:var(--ink-900);font-weight:500;font-size:16px;font-family:var(--font-mono)}

/* === 4 指标薄卡 === */
.ic-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.ic-kpi{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:#fff}
.ic-kpi .k{font-size:11.5px;color:var(--ink-500);letter-spacing:.04em;text-transform:uppercase}
.ic-kpi .v{font-family:var(--font-display);font-size:28px;font-weight:500;margin-top:6px;letter-spacing:-.01em}
.ic-kpi .d{font-size:11.5px;color:var(--ink-500);margin-top:4px}
.ic-kpi.v-ok .v{color:var(--ok)}
.ic-kpi.v-warn .v{color:var(--warn)}
.ic-kpi.v-bad .v{color:var(--bad)}

/* === Tabs === */
.ic-tabs{display:flex;align-items:flex-end;gap:28px;border-bottom:1px solid var(--line);margin-bottom:20px;padding-left:4px}
.ic-tab{position:relative;padding:9px 0 11px;font-size:13.5px;color:var(--ink-500);cursor:pointer;font-weight:500;letter-spacing:.01em;border:0;background:transparent}
.ic-tab:hover{color:var(--ink-700)}
.ic-tab.active{color:var(--ink-900)}
.ic-tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--brand);border-radius:2px 2px 0 0}
.ic-tab .cnt{margin-left:6px;font-size:11.5px;color:var(--ink-400);font-family:var(--font-mono)}
.ic-panel{border:1px solid var(--line);border-radius:12px;background:#fff;padding:22px 24px}

/* === 拓扑 Tab === */
.ic-topo-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.ic-topo-top h2{font-family:var(--font-body);font-weight:500;font-size:17px;margin:0;color:var(--ink-900);letter-spacing:-.005em}
.ic-topo-top h2 em{font-style:normal;color:var(--ink-500);font-weight:400;margin-left:2px}
.ic-topo-ctrl{margin-left:auto;display:flex;gap:6px}
.ic-segctl{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#FCFBF8}
.ic-segctl button{padding:6px 12px;border:0;background:transparent;font-size:12.5px;color:var(--ink-500);cursor:pointer}
.ic-segctl button.on{background:#fff;color:var(--ink-900);box-shadow:inset 0 0 0 1px var(--brand)}
.ic-topo-layout{display:grid;grid-template-columns:1fr 340px;gap:20px}
.ic-topo-canvas{position:relative;border:1px solid var(--line-soft);border-radius:10px;background:
  linear-gradient(#FCFBF8, #FCFBF8),
  repeating-linear-gradient(0deg, transparent 0 47px, rgba(15,23,42,.035) 47px 48px),
  repeating-linear-gradient(90deg, transparent 0 47px, rgba(15,23,42,.035) 47px 48px);
  background-blend-mode:normal,multiply,multiply;
  height:460px;overflow:hidden}
.ic-topo-svg{position:absolute;inset:0;width:100%;height:100%}
.ic-node{cursor:pointer;transition:filter .2s,transform .18s}
.ic-node:hover{filter:drop-shadow(0 4px 10px rgba(31,58,104,.22))}
.ic-node-box{fill:#fff;stroke:var(--ink-300);stroke-width:1;transition:stroke .15s,fill .15s}
.ic-node.self .ic-node-box{stroke:var(--brand);stroke-width:1.5;fill:var(--brand-soft)}
.ic-node.selected{transform-origin:center;filter:drop-shadow(0 0 12px rgba(31,58,104,.18))}
.ic-node.selected .ic-node-box{stroke:var(--brand);stroke-width:2}
.ic-node.dimmed{opacity:.4;transition:opacity .2s}
.ic-flow-particle{r:3.5;opacity:.85}
.ic-flow.bad{animation:ic-flow-pulse 1.8s ease-in-out infinite}
@keyframes ic-flow-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.ic-node.bad .ic-node-box{stroke:var(--bad);fill:var(--bad-bg)}
.ic-node.warn .ic-node-box{stroke:var(--warn);fill:var(--warn-bg)}
.ic-node-label{font-family:var(--font-body);font-size:13px;font-weight:500;fill:var(--ink-900);text-anchor:middle}
.ic-node-sub{font-family:var(--font-mono);font-size:11px;fill:var(--ink-700);text-anchor:middle}
.ic-node-stamp{font-family:var(--font-mono);font-size:10px;fill:var(--ink-500);text-anchor:middle;letter-spacing:.15em}
.ic-node.self .ic-node-label{fill:var(--brand-strong)}
.ic-node.self .ic-node-sub{fill:var(--brand)}

.ic-flow{fill:none;stroke-linecap:round}
.ic-flow.ok{stroke:var(--ok);stroke-width:2.5}
.ic-flow.warn{stroke:var(--warn);stroke-width:2.5}
.ic-flow.bad{stroke:var(--bad);stroke-width:2.5;stroke-dasharray:6 5}
.ic-flow-label{font-family:var(--font-mono);font-size:10px;fill:var(--ink-700)}

.ic-topo-detail{border:1px solid var(--line-soft);border-radius:10px;padding:18px;background:#FCFBF8;display:flex;flex-direction:column}
.ic-topo-detail .h{font-family:var(--font-display);font-size:18px;font-weight:500;margin:0 0 10px}
.ic-topo-detail .meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--ink-500)}
.ic-topo-detail .kv{display:grid;grid-template-columns:76px 1fr;gap:6px 12px;font-size:12.5px;color:var(--ink-700)}
.ic-topo-detail .kv dt{color:var(--ink-500)}
.ic-topo-detail .kv dd{margin:0;font-family:var(--font-mono);font-size:11.5px;word-break:break-all}
.ic-topo-detail .diag{margin-top:auto;border-top:1px dashed var(--line);padding-top:12px;font-size:12px;color:var(--ink-500)}
.ic-topo-detail .diag strong{color:var(--ok);font-weight:500}

.ic-topo-legend{display:flex;gap:16px;margin-top:12px;padding-left:4px;font-size:11.5px;color:var(--ink-500)}
.ic-topo-legend span{display:inline-flex;align-items:center;gap:6px}
.ic-topo-legend i{display:inline-block;width:18px;height:2px;border-radius:2px}
.ic-topo-legend i.ok{background:var(--ok)}
.ic-topo-legend i.warn{background:var(--warn)}
.ic-topo-legend i.bad{background:repeating-linear-gradient(90deg,var(--bad) 0 4px,transparent 4px 8px);height:2px}

/* === 站点 Tab (表格) === */
.ic-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ic-tbl thead th{text-align:left;padding:11px 14px;font-weight:500;color:var(--ink-500);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line)}
.ic-tbl tbody td{padding:13px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
.ic-tbl tbody tr:hover{background:#FCFBF8;cursor:pointer}
.ic-tbl tbody tr.active{background:var(--brand-soft)}
.ic-tbl .role{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--line-soft);color:var(--ink-700);font-weight:500}
.ic-tbl .role.master{background:var(--brand-soft);color:var(--brand)}
.ic-tbl .mono{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-700)}
.ic-row-act{display:flex;gap:6px;justify-content:flex-end}
.ic-row-act .ic-btn{height:28px;padding:0 10px;font-size:12px}

/* === 洞察 Tab === */
.ic-insight-row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:18px}
.ic-chart{height:260px;border:1px dashed var(--line);border-radius:10px;padding:14px;background:#FCFBF8;position:relative}
.ic-chart-title{font-size:12.5px;color:var(--ink-500);margin-bottom:8px}
.ic-chart-stage{height:200px;display:flex;align-items:flex-end;gap:4px}
.ic-chart-stage .bar{flex:1;display:flex;flex-direction:column-reverse;border-radius:2px 2px 0 0;overflow:hidden}
.ic-chart-stage .bar .f{background:var(--bad)}
.ic-chart-stage .bar .s{background:var(--ok)}
.ic-chart-axis{display:flex;gap:4px;margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--ink-400)}
.ic-chart-axis span{flex:1;text-align:center}
.ic-ins-list{border:1px solid var(--line-soft);border-radius:10px;overflow:hidden}
.ic-ins-list .h{padding:10px 14px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink-500);background:#FCFBF8;display:flex;align-items:center;justify-content:space-between}
.ic-ins-list ul{list-style:none;margin:0;padding:0}
.ic-ins-list li{padding:11px 14px;border-bottom:1px solid var(--line-soft);font-size:12.5px}
.ic-ins-list li:last-child{border-bottom:0}
.ic-ins-list .ttl{display:flex;align-items:center;gap:8px}
.ic-ins-list .ttl b{font-weight:500;color:var(--ink-900)}
.ic-ins-list .sub{color:var(--ink-500);margin-top:3px;font-size:11.5px;font-family:var(--font-mono)}
.ic-ins-list .pill{margin-left:auto;font-size:11px;color:var(--bad);background:var(--bad-bg);padding:2px 8px;border-radius:999px}

/* === 日志 Tab === */
.ic-log-filters{display:grid;grid-template-columns:120px 120px 160px 1fr 100px;gap:8px;margin-bottom:12px}
.ic-log-filters select,.ic-log-filters input{height:32px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;font-size:12.5px;color:var(--ink-900);outline:none}
.ic-log-filters select:focus,.ic-log-filters input:focus{border-color:var(--brand)}
.ic-log-badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.ic-log-badge.ok{background:var(--ok-bg);color:var(--ok)}
.ic-log-badge.warn{background:var(--warn-bg);color:var(--warn)}
.ic-log-badge.bad{background:var(--bad-bg);color:var(--bad)}
.ic-log-err{margin-top:6px;padding:6px 10px;background:var(--bad-bg);color:var(--bad);border-radius:6px;font-family:var(--font-mono);font-size:11px}
.ic-log-pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:12px;color:var(--ink-500)}
.ic-log-pager .pg{display:flex;gap:6px}

/* === 站点详情抽屉 === */
.ic-scrim{position:fixed;inset:0;background:rgba(15,23,42,.32);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s ease}
.ic-scrim.on{opacity:1;pointer-events:auto}

function Sparkline({data,color,width=80,height=22}){
  if(!data||!data.length) return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*height}`).join(' ');
  return (
    <svg className="ic-kpi-spark" width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts} stroke={color||'var(--brand)'} />
    </svg>
  );
}

function ProgressRing({value,max,size=48,stroke=4,color='var(--ok)',label}){
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const pct = max>0 ? Math.min(value/max,1) : 0;
  const offset = circ*(1-pct);
  return (
    <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--line)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset .5s ease'}}/>
      </svg>
      {label && <span style={{fontSize:10,color:'var(--ink-500)',fontFamily:'var(--font-mono)'}}>{label}</span>}
    </div>
  );
}

    const a = nodePositions[fromId], b = nodePositions[toId];

    const bx = b.x + b.w/2, by = b.y + b.h/2;

              <marker id="arrow-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.68 0.14 150)"/></marker>
              <marker id="arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.72 0.16 75)"/></marker>
              <marker id="arrow-bad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.62 0.20 25)"/></marker>
            </defs>

            {/* flows */}
            {MOCK_FLOWS.filter(f => dir==="all"||f.direction===dir).map((f,i)=>{
              const a = NODE_POS[f.from], b = NODE_POS[f.to];
              const mx = ((a.x+a.w/2)+(b.x+b.w/2))/2;
              const my = ((a.y+a.h/2)+(b.y+b.h/2))/2 - 18;
              const d = arrowPath(f.from,f.to);
              const particleColor = f.tone==='ok'?'oklch(0.68 0.14 150)':f.tone==='warn'?'oklch(0.72 0.16 75)':'oklch(0.62 0.20 25)';
              return (
                <g key={i}>
                  <path className={`ic-flow ${f.tone}`} d={d} markerEnd={`url(#arrow-${f.tone})`}/>
                  <text className="ic-flow-label" x={mx} y={my} textAnchor="middle">{f.label}</text>
                  {f.tone!=='bad' && (
                    <>
                      <circle className="ic-flow-particle" fill={particleColor}>
                        <animateMotion dur={f.tone==='ok'?'2.5s':'4s'} repeatCount="indefinite" path={d}/>
                      </circle>
                      <circle className="ic-flow-particle" fill={particleColor} opacity=".5">
                        <animateMotion dur={f.tone==='ok'?'2.5s':'4s'} repeatCount="indefinite" path={d} begin="1.2s"/>
                      </circle>
                    </>
                  )}
                </g>
              );
            })}

            {/* nodes */}
            {MOCK_SITES.map(s => {
              const p = nodePositions[s.id];
              const tone = s.avail==="online"?"":s.avail==="cached"?"warn":"bad";
              const isSelf = s.role==="self";
              const isSel = selected===s.id;
              const statusDotColor = s.avail==="online"?"var(--ok)":s.avail==="cached"?"var(--warn)":"var(--bad)";
              return (
                <g key={s.id}
                   className={`ic-node ${tone} ${isSelf?'self':''} ${isSel?'selected':''} ${selected&&!isSel?'dimmed':''}`}
                   onClick={()=>{if(!dragging)setSelected(s.id);}}
                   onMouseDown={e=>onDragStart(e,s.id)}
                   onMouseEnter={()=>setHoveredNode(s.id)}
                   onMouseLeave={()=>setHoveredNode(null)}
                   transform={`translate(${p.x} ${p.y})`}
                   style={{cursor:dragging&&dragging.id===s.id?'grabbing':'grab'}}>
                  <rect className="ic-node-box" width={p.w} height={p.h} rx="12"/>
                  <circle cx={14} cy={16} r={4} fill={statusDotColor}/>
                  <text className="ic-node-label" x={p.w/2} y={32}>{s.name}</text>
                  <text className="ic-node-sub"   x={p.w/2} y={52}>{s.http.replace('http://','')}</text>
                  <foreignObject x={0} y={p.h-56} width={p.w} height={22}>
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{display:'flex',justifyContent:'center',gap:6,pointerEvents:'none'}}>
                      <span className={`ic-statechip ${s.status}`} style={{transform:'scale(.9)',transformOrigin:'center'}}>
                        <span className="d"/>{s.status_label}
                      </span>
                    </div>
                  </foreignObject>
                  <line x1={20} y1={p.h-22} x2={p.w-20} y2={p.h-22} stroke="var(--line)" strokeWidth={1}/>
                  <text className="ic-node-stamp" x={p.w/2} y={p.h-8}>{s.location} · {s.site_id}</text>
                </g>
              );
            })}
          </svg>
          {hoveredNode && !dragging && (()=>{
            const hs = MOCK_SITES.find(s=>s.id===hoveredNode);
            const hp = nodePositions[hoveredNode];
            if(!hs||!hp) return null;
            return (
              <div className="ic-node-tip" style={{left:hp.x+hp.w/2,top:hp.y-10,transform:'translate(-50%,-100%)'}}>
                <div className="tip-name">{hs.name} · {hs.site_id}</div>
                <div className="tip-row">{hs.avail_label} · {hs.status_label}</div>
                <div className="tip-row">{hs.http} · {hs.diag.at}</div>
              </div>
            );
          })()}
        </div>

        {fullscreen && (
          <div className="ic-topo-fullscreen" style={{position:'fixed',inset:0,zIndex:60}}>
            <div className="ic-topo-bar">
              <h3>拓扑全屏 · {MOCK_SITES.length} 节点</h3>
              <button className="ic-btn" onClick={()=>setFullscreen(false)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                关闭 (Esc)
              </button>
            </div>
            <div className="ic-topo-canvas" style={{flex:1}}>
              <svg className="ic-topo-svg" viewBox="0 0 900 480" preserveAspectRatio="xMidYMid meet">
                <defs>
                  <marker id="fs-arrow-ok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.68 0.14 150)"/></marker>
                  <marker id="fs-arrow-warn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.72 0.16 75)"/></marker>
                  <marker id="fs-arrow-bad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="oklch(0.62 0.20 25)"/></marker>
                </defs>
                {MOCK_FLOWS.map((f,i)=>{
                  const d=arrowPath(f.from,f.to);
                  return <g key={i}><path className={`ic-flow ${f.tone}`} d={d} markerEnd={`url(#fs-arrow-${f.tone})`}/></g>;
                })}
                {MOCK_SITES.map(s=>{
                  const p=NODE_POS[s.id];
                  const tone=s.avail==='online'?'':s.avail==='cached'?'warn':'bad';
                  const dot=s.avail==='online'?'var(--ok)':s.avail==='cached'?'var(--warn)':'var(--bad)';
                  return (
                    <g key={s.id} className={`ic-node ${tone} ${s.role==='self'?'self':''}`} onClick={()=>{setSelected(s.id);setFullscreen(false);}} transform={`translate(${p.x} ${p.y})`}>
                      <rect className="ic-node-box" width={p.w} height={p.h} rx="12"/>
                      <circle cx={14} cy={16} r={4} fill={dot}/>
                      <text className="ic-node-label" x={p.w/2} y={32}>{s.name}</text>
                      <text className="ic-node-sub" x={p.w/2} y={52}>{s.http.replace('http://','')}</text>
                      <text className="ic-node-stamp" x={p.w/2} y={p.h-8}>{s.location} · {s.site_id}</text>
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>
        )}

        <div className="ic-topo-detail" style={{overflow:'auto'}}>
          <h3 className="h">{selSite.name}</h3>
          <div className="meta">
            <span className={`ic-statuspill ${selSite.diag.ok?'ok':(selSite.avail==='cached'?'warn':'bad')}`}><span className="dot"/>{selSite.avail_label}</span>
            <span className={`ic-log-badge ${selSite.role==='self'?'ok':'warn'}`} style={{background:'var(--brand-soft)',color:'var(--brand)'}}>{selSite.role==='self'?'本站 · Master':'Peer'}</span>
          </div>
          <dl className="kv">
            <dt>HTTP</dt><dd>{selSite.http}</dd>
            <dt>dbnums</dt><dd>{selSite.dbnums}</dd>
          </dl>

          <div style={{display:'flex',gap:16,marginTop:12,justifyContent:'center'}}>
            <ProgressRing value={selSite.synced} max={selSite.synced+selSite.pending} size={52} color="var(--ok)" label={`${selSite.synced} 已同步`}/>
            <ProgressRing value={selSite.files} max={600} size={52} color="var(--brand)" label={`${selSite.files} 文件`}/>
            <ProgressRing value={selSite.records} max={150000} size={52} color={selSite.diag.ok?'var(--ok)':'var(--bad)'} label={`${(selSite.records/1000).toFixed(0)}k 记录`}/>
          </div>

          {/* 关联活跃任务 */}
          {(()=>{
            const siteTasks = MOCK_ACTIVE_TASKS.filter(t=>t.site_id===selected);
            if(!siteTasks.length) return null;
            return (
              <div style={{marginTop:14,padding:'10px 0',borderTop:'1px dashed var(--line)'}}>
                <div style={{fontSize:11,color:'var(--ink-500)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>进行中任务 · {siteTasks.length}</div>
                {siteTasks.map(t=>(
                  <div key={t.task_id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',fontSize:12}}>
                    <span className={`ic-statechip ${t.status==='Running'?'Syncing':'Idle'}`} style={{transform:'scale(.85)',transformOrigin:'left center'}}><span className="d"/>{t.status}</span>
                    <span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--ink-700)'}}>{t.task_name}</span>
                    <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--ink-500)'}}>{t.progress}%</span>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* 诊断历史 */}
          {(()=>{
            const history = MOCK_DIAG_HISTORY[selected] || [];
            if(!history.length) return null;
            return (
              <div style={{marginTop:history.length?0:14,padding:'10px 0',borderTop:'1px dashed var(--line)'}}>
                <div style={{fontSize:11,color:'var(--ink-500)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>诊断历史 · 最近 {history.length} 次</div>
                {history.map((h,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',fontSize:12}}>
                    <span style={{fontFamily:'var(--font-mono)',fontSize:10.5,color:'var(--ink-500)',width:60,flexShrink:0}}>{h.at}</span>
                    <span className={`ic-log-badge ${h.ok?'ok':'bad'}`} style={{fontSize:10,padding:'1px 6px'}}>{h.ok?'ok':'fail'}</span>
                    <span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--ink-700)',fontSize:11}}>{h.msg}</span>
                    <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--ink-400)'}}>{h.ms!=null?`${h.ms}ms`:'—'}</span>
                  </div>
                ))}
              </div>
            );
          })()}

          <div className="diag" style={{marginTop:'auto'}}>
            <div style={{fontSize:12,color:'var(--ink-500)',marginTop:2,fontStyle:'italic'}}>{selSite.notes}</div>
          </div>
        </div>
      </div>

      <div className="ic-topo-legend">
        <span><i className="ok"/>正常同步</span>
        <span><i className="warn"/>部分失败</span>
        <span><i className="bad"/>全部失败</span>
        <span style={{marginLeft:'auto',color:'var(--ink-400)'}}>数据源 <code>/api/remote-sync/stats/flows</code> + <code>/envs/:id/sites</code></span>
      </div>
    </>
  );
}

function ConfirmDialog({open,title,message,danger,onConfirm,onCancel}){
  if(!open) return null;
  return (
    <div className="ic-confirm-scrim" onClick={onCancel}>
      <div className="ic-confirm" onClick={e=>e.stopPropagation()}>
        <h4>{title}</h4>
        <p>{message}</p>
        <div className="acts">
          <button className="ic-btn" onClick={onCancel}>取消</button>
          <button className="ic-btn" style={danger?{background:'var(--bad)',color:'#fff',borderColor:'var(--bad)'}:{}} onClick={onConfirm}>{danger?'确认删除':'确认'}</button>
        </div>
      </div>
    </div>
  );
}

  React.useEffect(()=>{

    document.body.style.overflow='hidden';
    const onKey = e => { if(e.key==="Escape") onClose(); };

    return ()=>{document.removeEventListener("keydown", onKey);document.body.style.overflow='';};
  },[siteId,onClose]);

  return (
    <>

                <button className="ic-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

              )}
              {(site.status==='Scanning'||site.status==='Syncing') && (
                <button className="ic-btn" style={{borderColor:'var(--bad)',color:'var(--bad)'}}>

                  中止

                <button className="ic-btn" style={{borderColor:'var(--bad)',color:'var(--bad)'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/></svg>

              <button className="ic-btn ic-btn-primary">保存修改</button>
            </div>
          </>
        )}
      </aside>
    </>
  );
}

function SitesTab(){
  const [openSite,setOpenSite] = useState(()=>{
    const sub = getInitialSub();
    return MOCK_SITES.some(s=>s.id===sub) ? sub : null;
  });
  const [sortCol,setSortCol] = useState(null);
  const [sortDir,setSortDir] = useState('asc');
  function toggleSort(col){
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }
  const sortedSites = useMemo(()=>{
    if(!sortCol) return MOCK_SITES;
    const arr=[...MOCK_SITES];
    const m = sortDir==='asc'?1:-1;
    arr.sort((a,b)=>{
      if(sortCol==='name') return m*a.name.localeCompare(b.name);
      if(sortCol==='role') return m*a.role.localeCompare(b.role);
      if(sortCol==='health') return m*(a.diag.ok===b.diag.ok?0:a.diag.ok?-1:1);
      if(sortCol==='status') return m*a.status.localeCompare(b.status);
      if(sortCol==='sync') return m*a.diag.at.localeCompare(b.diag.at);
      return 0;
    });
    return arr;
  },[sortCol,sortDir]);
  const [addSiteOpen,setAddSiteOpen] = useState(false);
  const SortTh = ({col,children,...rest})=>(
    <th {...rest} className={`sortable ${sortCol===col?'sorted':''}`} onClick={()=>toggleSort(col)}>
      {children}<span className="sort-icon">{sortCol===col?(sortDir==='asc'?'↑':'↓'):'⇅'}</span>
    </th>
  );
  return (
    <>
      <div className="ic-topo-top">
        <h2>站点 · <em>{MOCK_SITES.length} 个</em></h2>
        <div className="ic-topo-ctrl">
          <button className="ic-btn" style={{height:30,padding:'0 12px',fontSize:12}} onClick={()=>setAddSiteOpen(true)}>+ 新增站点</button>
          <button className="ic-btn" style={{height:30,padding:'0 12px',fontSize:12}}>批量诊断</button>
        </div>
      </div>

      {addSiteOpen && (
        <div className="ic-modal-scrim" onClick={()=>setAddSiteOpen(false)}>
          <div className="ic-modal" onClick={e=>e.stopPropagation()}>
            <div className="ic-modal-hdr">
              <h4>新增站点</h4>

function LogsTab(){
  const [q,setQ] = useState("");

  const [expandedLog,setExpandedLog] = useState(null);
  const filtered = useMemo(() => MOCK_LOGS.filter(l =>
    (status==="all"||l.status===status) &&
    (!q||(l.target+l.path+l.task+(l.err||'')).toLowerCase().includes(q.toLowerCase()))
  ),[q,status]);

  function exportCSV(){
    const header='时间,状态,方向,目标,任务,路径,记录,大小,错误\n';
    const rows=MOCK_LOGS.map(l=>`"${l.at}","${l.status}","${l.direction}","${l.target}","${l.task}","${l.path}","${l.records}","${l.size}","${(l.err||'').replace(/"/g,'""')}"`).join('\n');
    const blob=new Blob(['\ufeff'+header+rows],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`sync-logs-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);

/* ============ Toast ============ */
function Toasts({items,onClose}){
  const timers = useRef({});
  useEffect(()=>{
    items.forEach(t=>{
      if(!timers.current[t.id]){
        timers.current[t.id] = setTimeout(()=>onClose(t.id),5200);
      }
    });
    return ()=>{};
  },[items,onClose]);
  if(!items.length) return null;
  return (
    <div className="ic-toasts">
      {items.slice(0,4).map(t => (
        <div key={t.id} className={`ic-toast ${t.type}`}
          onMouseEnter={()=>{clearTimeout(timers.current[t.id]);delete timers.current[t.id];}}
          onMouseLeave={()=>{timers.current[t.id]=setTimeout(()=>onClose(t.id),5200);}}>
          <span className="ic">{t.icon}</span>
          <div>
            <div className="ti">{t.title}</div>
            <div className="ms">{t.message}</div>
            <div className="at">{t.at}</div>
          </div>
          <button className="cl" onClick={()=>onClose(t.id)} aria-label="关闭">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div className="ic-toast-timer"><div className="bar"/></div>
        </div>
      ))}
    </div>
  );
}

/* ============ 活跃任务条 ============ */
function ActiveTasksStrip({tasks}){
  if(!tasks.length) return null;
  return (
    <div className="ic-active-strip">
      {tasks.map(t=>{
        const isRunning = t.status==='Running';
        const isPending = t.status==='Pending';
        return (
          <div key={t.task_id} className={`ic-active-card ${isRunning?'running':''} ${isPending?'pending':''}`}>
            <div className="t">
              <div style={{display:'flex',flexDirection:'column',gap:2,minWidth:0,flex:1}}>
                <div className="nm">{t.task_name} · {t.site_name}</div>
                <div className="pth">{t.file_path}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <span className={`ic-statechip ${isRunning?'Syncing':isPending?'Idle':'Completed'}`}>
                  <span className="d"/>
                  {t.status}
                </span>
                {isRunning && <div className="pc" style={{marginTop:4}}>{t.progress}%</div>}
                {isPending && <div className="pc" style={{marginTop:4,color:'var(--ink-400)'}}>等待中</div>}
              </div>
            </div>
            <div className="ic-bar"><div className="f" style={{width:isPending?'100%':`${t.progress}%`}}/></div>
          </div>
        );
      })}
    </div>
  );
}

const VALID_TABS = ["topo","sites","insight","logs"];
function parseHash(){
  const raw = (typeof location!=="undefined" && location.hash || "").replace(/^#/,"");
  const [t, sub] = raw.split(":");
  return { tab: VALID_TABS.includes(t) ? t : "topo", sub: sub || null };
}
function getInitialTab(){ return parseHash().tab; }
function getInitialSub(){ return parseHash().sub; }

function usePersist(key,fallback){
  const [val,setVal] = useState(()=>{try{const v=localStorage.getItem('collab-'+key);return v!=null?JSON.parse(v):fallback;}catch{return fallback;}});
  const set = useCallback(v=>{const nv=typeof v==='function'?v(val):v;setVal(nv);try{localStorage.setItem('collab-'+key,JSON.stringify(nv));}catch{}},[key]);
  return [val,set];
}

function App(){
  const [selectedEnv,setSelectedEnv] = usePersist("env","env1");
  const [tab,setTab] = useState(getInitialTab);
  const [menuOpen,setMenuOpen] = useState(false);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [realtimeConnected,setRealtimeConnected] = useState(true);
  const [theme,setTheme] = usePersist("theme",(()=>{
    if(typeof window==="undefined") return "light";
    if(location.search.includes("theme=dark")) return "dark";
    if(location.search.includes("theme=light")) return "light";
    return "light";
  })());
  const [notifyOn,setNotifyOn] = usePersist("notify",true);
  const [configOpen,setConfigOpen] = useState(()=>{
    return typeof location!=="undefined" && (location.hash==="#config" || location.search.includes("open=config"));
  });
  const [config,setConfig] = useState(MOCK_CONFIG);
  const [toasts,setToasts] = useState(MOCK_TOASTS_INITIAL);
  const [activeTasks,setActiveTasks] = useState(MOCK_ACTIVE_TASKS);
  const [clockStr,setClockStr] = useState(()=>new Date().toLocaleTimeString('zh-CN',{hour12:false}));
  const toastIdRef = useRef(100);

  const addToast = useCallback((type,icon,title,message)=>{
    const id = 'rt-'+(toastIdRef.current++);
    setToasts(prev=>[{id,type,icon,title,message,at:'刚刚'},...prev].slice(0,5));
  },[]);

  const [shortcutOpen,setShortcutOpen] = useState(false);

  useEffect(()=>{
    const onHash = () => setTab(getInitialTab());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  },[]);
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", theme);
  },[theme]);

  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      if(e.key==='?'||e.key==='/'&&e.shiftKey){e.preventDefault();setShortcutOpen(v=>!v);return;}
      if(e.key==='1'){pickTab('topo');return;}
      if(e.key==='2'){pickTab('sites');return;}
      if(e.key==='3'){pickTab('insight');return;}
      if(e.key==='4'){pickTab('logs');return;}
      if(e.key==='d'){setTheme(t=>t==='dark'?'light':'dark');return;}
      if(e.key==='n'){setNotifyOn(v=>!v);return;}
    }
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[]);

  useEffect(()=>{
    const t = setInterval(()=>setClockStr(new Date().toLocaleTimeString('zh-CN',{hour12:false})),1000);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    const t = setInterval(()=>{
      setActiveTasks(prev=>prev.map(task=>{
        if(task.status!=='Running') return task;
        const inc = Math.floor(Math.random()*8)+3;
        const next = Math.min(task.progress+inc,100);
        if(next>=100){
          setTimeout(()=>addToast('success','✓',`${task.task_name} 完成`,`${task.site_name} · 任务 ${task.task_id}`),200);
          return {...task,progress:100,status:'Completed'};
        }
        return {...task,progress:next};
      }));
    },3000);
    return ()=>clearInterval(t);
  },[addToast]);

  function pickTab(k){ setTab(k); location.hash = k; }
  function closeToast(id){ setToasts(prev=>prev.filter(t=>t.id!==id)); }
  const env = MOCK_ENVS.find(e=>e.id===selectedEnv);
  const TABS = [
    {k:"topo",label:"拓扑",cnt:MOCK_SITES.length},
    {k:"sites",label:"站点",cnt:MOCK_SITES.length},
    {k:"insight",label:"洞察"},
    {k:"logs",label:"日志",cnt:MOCK_LOGS.length},
  ];
  return (
    <>
      <CmdBar
        env={env}
        menuOpen={menuOpen}
        onMenuToggle={()=>setMenuOpen(v=>!v)}
        realtimeConnected={realtimeConnected}
        theme={theme}
        onToggleTheme={()=>setTheme(theme==='dark'?'light':'dark')}
        notifyOn={notifyOn}
        onToggleNotify={()=>setNotifyOn(v=>!v)}
        onOpenConfig={()=>{setMenuOpen(false);setConfigOpen(true)}}
        clockStr={clockStr}
        onToggleSidebar={()=>setSidebarOpen(v=>!v)}
      />
      <div className="ic-shell">
        <Sidebar envs={MOCK_ENVS} selectedId={selectedEnv} onSelect={id=>{setSelectedEnv(id);setMenuOpen(false);setSidebarOpen(false)}} sidebarOpen={sidebarOpen}/>
        <main className="ic-main" onClick={()=>menuOpen&&setMenuOpen(false)}>

          {/* Hero */}
          <section className="ic-hero" key={env.id}>
            <div>
              <h1><em>{env.name}</em></h1>
              <p>多站点 PDMS 增量数据跨地同步 · 以拓扑视角审视 <em style={{fontStyle:'normal',color:'var(--brand)'}}>谁在同谁</em> 和异常集中区。</p>
              <div style={{display:'flex',gap:6,marginTop:10}}>
                {MOCK_SITES.map(s=>(
                  <span key={s.id} title={`${s.name} · ${s.avail_label}`} style={{width:8,height:8,borderRadius:'999px',background:s.avail==='online'?'var(--ok)':s.avail==='cached'?'var(--warn)':'var(--bad)'}}/>
                ))}
                <span style={{fontSize:11,color:'var(--ink-400)',marginLeft:4}}>{env.site_count} 站点</span>
              </div>
            </div>
            <div className="ic-hero-meta">
              <span>运行 <strong>{env.uptime}</strong></span>
              <span>文件服务 <strong>{env.file_server}</strong></span>
              <span>区域 DB <strong>{env.dbnums}</strong></span>
            </div>
          </section>

          {/* Tabs */}
          <div className="ic-tabs">
            {TABS.map(t=>(
              <button key={t.k} className={`ic-tab ${tab===t.k?'active':''}`} onClick={()=>pickTab(t.k)}>
                {t.label}{t.cnt!=null && <span className="cnt">{t.cnt}</span>}
              </button>
            ))}
          </div>

          <div className="ic-panel ic-panel-anim" key={tab}>
            {tab==="topo"    && <TopologyTab/>}
            {tab==="sites"   && <SitesTab/>}
            {tab==="insight" && <InsightsTab/>}
            {tab==="logs"    && <LogsTab/>}
          </div>

        </main>
      </div>
      <ConfigDrawer open={configOpen} onClose={()=>setConfigOpen(false)} config={config} setConfig={setConfig} addToast={addToast}/>
      {notifyOn && <Toasts items={toasts} onClose={closeToast}/>}
      {shortcutOpen && (
        <div className="ic-modal-scrim" onClick={()=>setShortcutOpen(false)}>
          <div className="ic-modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
            <div className="ic-modal-hdr">
              <h4>快捷键</h4>
              <button className="ic-drw-close" onClick={()=>setShortcutOpen(false)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div style={{padding:'16px 24px 24px'}}>
              {[
                ['?','打开/关闭快捷键面板'],
                ['1 / 2 / 3 / 4','切换 Tab (拓扑/站点/洞察/日志)'],
                ['D','切换暗色/浅色模式'],
                ['N','切换通知开关'],
                ['Esc','关闭抽屉/全屏/弹窗'],
              ].map(([k,d])=>(
                <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--line-soft)'}}>
                  <span style={{fontSize:13,color:'var(--ink-700)'}}>{d}</span>
                  <kbd style={{fontFamily:'var(--font-mono)',fontSize:11,background:'var(--line-soft)',padding:'2px 8px',borderRadius:4,color:'var(--ink-900)',border:'1px solid var(--line)'}}>{k}</kbd>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
