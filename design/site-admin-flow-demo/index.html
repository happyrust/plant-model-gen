  <style>
    :root {
      --background: #FFFFFF;
      --foreground: #0A0A0B;
      --card: #FFFFFF;
      --card-foreground: #0A0A0B;
      --muted: #F4F4F5;
      --muted-foreground: #71717A;
      --accent: #F4F4F5;
      --accent-foreground: #18181B;
      --primary: #18181B;
      --primary-foreground: #FAFAFA;
      --secondary: #F4F4F5;
      --secondary-foreground: #18181B;
      --destructive: #DC2626;
      --destructive-foreground: #FAFAFA;
      --border: #E4E4E7;
      --border-soft: #F0F0F2;
      --input: #E4E4E7;
      --ring: #0A0A0B;
      --color-success: #DCFCE7;
      --color-success-foreground: #166534;
      --color-success-strong: #16A34A;
      --color-warning: #FEF3C7;
      --color-warning-foreground: #92400E;
      --color-warning-strong: #D97706;
      --color-error: #FEE2E2;
      --color-error-foreground: #991B1B;
      --color-error-strong: #DC2626;
      --color-info: #DBEAFE;
      --color-info-foreground: #1E40AF;
      --color-info-strong: #2563EB;
      --color-cyan: #CFFAFE;
      --color-cyan-foreground: #155E75;
      --color-violet: #EDE9FE;
      --color-violet-foreground: #5B21B6;
      --color-slate: #F1F5F9;
      --color-slate-foreground: #334155;
      --font-primary: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-primary);
      color: var(--foreground);
      background: #FAFAFA;
      font-feature-settings: "cv02", "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; cursor: pointer; border: 0; padding: 0; background: transparent; color: inherit; }
    input, select { font-family: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4D4D8; border-radius: 999px; border: 2px solid #FAFAFA; }
    ::-webkit-scrollbar-thumb:hover { background: #A1A1AA; }

    /* -- Stage auto-scale letterbox, fixes 1440 design on smaller screens -- */
    .stage-viewport {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #0A0A0B;
      overflow: auto;
    }
    .stage-content {
      width: 1440px;
      min-height: 900px;
      transform-origin: top center;
      background: #FAFAFA;
      box-shadow: 0 20px 60px -30px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* -- Utility classes -- */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 500; line-height: 1.4;
      white-space: nowrap;
    }
    .btn { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: background 0.14s ease, box-shadow 0.14s ease, color 0.14s ease; line-height: 1; }
    .btn:disabled, .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: var(--primary-foreground); }
    .btn-primary:hover:not(:disabled) { background: #27272A; }
    .btn-outline { background: var(--background); color: var(--foreground); box-shadow: inset 0 0 0 1px var(--input); }
    .btn-outline:hover:not(:disabled) { background: var(--accent); }
    .btn-destructive { background: var(--color-error-strong); color: #fff; }
    .btn-destructive:hover:not(:disabled) { background: #B91C1C; }
    .btn-warning { background: var(--color-warning-strong); color: #fff; }
    .btn-warning:hover:not(:disabled) { background: #B45309; }
    .btn-success { background: var(--color-success-strong); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #15803D; }
    .btn-ghost { color: var(--foreground); }
    .btn-ghost:hover:not(:disabled) { background: var(--accent); }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      color: var(--muted-foreground);
      transition: background 0.14s ease, color 0.14s ease;
    }
    .icon-btn:hover:not(:disabled) { background: var(--accent); color: var(--foreground); }
    .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input {
      display: flex; align-items: center; width: 100%;
      height: 36px; padding: 0 12px; border-radius: 6px;
      background: var(--background);
      box-shadow: inset 0 0 0 1px var(--input);
      font-size: 14px; color: var(--foreground);
      transition: box-shadow 0.14s ease;
    }
    .input:focus-within, .input:focus { outline: none; box-shadow: inset 0 0 0 1.5px var(--ring); }
    .input input { width: 100%; background: transparent; border: 0; outline: none; font-size: 14px; color: inherit; }
    .input input::placeholder { color: var(--muted-foreground); }

    .card { background: var(--card); box-shadow: inset 0 0 0 1px var(--border); border-radius: 8px; }
    .card-soft { background: var(--background); box-shadow: inset 0 0 0 1px var(--border-soft); border-radius: 8px; }
    .section-title { font-size: 18px; font-weight: 500; color: var(--foreground); margin: 0; }
    .section-subtitle { font-size: 13px; color: var(--muted-foreground); margin: 0; }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(10,10,11,0.5);
      animation: fadeIn 0.18s ease;
      z-index: 40;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .drawer-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 520px; max-width: 95vw;
      background: var(--card);
      box-shadow: -8px 0 48px -12px rgba(0,0,0,0.15);
      display: flex; flex-direction: column;
      animation: slideIn 0.22s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 41;
    }
    @keyframes slideIn { from { transform: translateX(100%); } }

    /* Dialog */
    .dialog-overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,11,0.5);
      display: grid; place-items: center;
      animation: fadeIn 0.15s ease;
      z-index: 50;
    }
    .dialog-panel {
      width: 460px; max-width: 92vw;
      background: var(--card); border-radius: 12px;
      box-shadow: 0 20px 60px -12px rgba(0,0,0,0.25);
      animation: dialogIn 0.18s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes dialogIn { from { opacity: 0; transform: scale(0.94) translateY(8px); } }

    /* Toast */
    .toast-layer {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 60; pointer-events: none;
    }
    .toast-card {
      min-width: 280px; max-width: 360px;
      background: var(--card); border-radius: 8px;
      padding: 12px 14px; gap: 10px;
      display: flex; align-items: flex-start;
      box-shadow: 0 12px 40px -12px rgba(0,0,0,0.2), inset 0 0 0 1px var(--border);
      pointer-events: auto;
      animation: toastIn 0.2s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } }

    /* Devtools */
    .devtools {
      position: fixed; right: 16px; bottom: 16px;
      background: rgba(10,10,11,0.92); color: #FAFAFA;
      border-radius: 10px; padding: 10px 12px;
      font-size: 11px; font-family: var(--font-mono);
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 8px 32px -8px rgba(0,0,0,0.4);
      z-index: 70; pointer-events: auto;
    }
    .devtools strong { text-transform: uppercase; letter-spacing: 0.06em; color: #A1A1AA; font-weight: 500; }
    .devtools button {
      color: #FAFAFA;
      padding: 3px 8px; border-radius: 999px;
      font-family: var(--font-mono); font-size: 11px;
      background: rgba(255,255,255,0.1);
      transition: background 0.14s ease;
    }
    .devtools button.on { background: #FAFAFA; color: #0A0A0B; }
    .devtools button:hover:not(.on) { background: rgba(255,255,255,0.18); }

    /* Table row hover */
    .row { transition: background 0.12s ease; }
    .row:hover { background: rgba(244,244,245,0.7); cursor: pointer; }
    .row:hover .row-actions { opacity: 1; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #F4F4F5 0%, #E4E4E7 50%, #F4F4F5 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>

      case "CLOSE_DRAWER":
        return { ...state, drawer: { ...state.drawer, open: false } };
      case "SAVE_SITE": {

          return {
            ...state,
            sites: state.sites.map((s) => (s.site_id === action.site.site_id ? { ...s, ...action.site } : s)),
            drawer: { ...state.drawer, open: false },
            toast: { tone: "success", message: `站点「${action.site.project_name}」已保存` },
          };
        }
        return {
          ...state,
          sites: [...state.sites, action.site],
          drawer: { ...state.drawer, open: false },
          toast: { tone: "success", message: `新站点「${action.site.project_name}」已创建` },
        };
      }
      case "OPEN_DIALOG":
        return { ...state, dialog: action.dialog };
      case "CLOSE_DIALOG":
        return { ...state, dialog: null };
      case "CONFIRM_DELETE": {
        const site = state.sites.find((s) => s.site_id === action.siteId);
        return {
          ...state,
          sites: state.sites.filter((s) => s.site_id !== action.siteId),
          dialog: null,

        };
      }
      case "START_PENDING":
        return {
          ...state,
          pendingActions: { ...state.pendingActions, [action.siteId]: action.action },
        };
      case "END_PENDING": {
        const next = { ...state.pendingActions };
        delete next[action.siteId];
        let toast = null;
        let sites = state.sites;
        if (action.action === "start") {
          sites = sites.map((s) =>
            s.site_id === action.siteId ? { ...s, status: "Running", started_at: nowIso(), last_error: null, entry_url: `http://plant.example.com:${s.web_port}`, local_entry_url: `http://127.0.0.1:${s.web_port}` } : s
          );
          toast = { tone: "success", message: "启动成功 · Viewer 已就绪" };
        } else if (action.action === "stop") {
          sites = sites.map((s) => (s.site_id === action.siteId ? { ...s, status: "Stopped", started_at: null, entry_url: null, local_entry_url: null } : s));
          toast = { tone: "success", message: "已停止 · 端口释放" };
        } else if (action.action === "parse") {
          sites = sites.map((s) => (s.site_id === action.siteId ? { ...s, parse_status: "Parsed", last_parse_finished_at: nowIso(), last_parse_duration_ms: 12 * 60 * 1000 + 42 * 1000 } : s));
          toast = { tone: "success", message: "解析完成 · 12m 42s 处理 38 412 个实体" };
        }
        return { ...state, pendingActions: next, sites, toast };

      case "FAIL_ACTION": {
        const next = { ...state.pendingActions };
        delete next[action.siteId];
        const sites = state.sites.map((s) => (s.site_id === action.siteId ? { ...s, status: action.action === "start" ? "Failed" : s.status, last_error: action.message } : s));
        return { ...state, pendingActions: next, sites, toast: { tone: "error", message: action.message } };

      case "HIDE_TOAST":
        return { ...state, toast: null };
      case "SET_QUICK_FILTER":
        return { ...state, quickFilter: action.filter };
      case "SET_SEARCH":
        return { ...state, search: action.value };

        {site.parse_plan?.label && (
          <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 4 }}>
            <Chip tone={PARSE_PLAN_TONE[site.parse_plan.mode] || "slate"}>{site.parse_plan.label}</Chip>
            <div style={{ maxWidth: 260, fontSize: 12, color: "var(--muted-foreground)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={site.parse_plan.detail}>{site.parse_plan.detail}</div>
          </div>
        )}
      </td>
      <td style={{ padding: "14px 16px", verticalAlign: "top", fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--muted-foreground)" }}>
        <div>D:{site.db_port} · W:{site.web_port}</div>
      </td>
      <td style={{ padding: "14px 16px", verticalAlign: "top" }}>
        <Chip tone={RISK_TONE[site.risk_level]}>{RISK_LABEL[site.risk_level]}</Chip>
        {site.risk_reasons?.[0] && (
          <div style={{ maxWidth: 200, fontSize: 12, marginTop: 4, color: "var(--muted-foreground)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={site.risk_reasons.join("；")}>
            {site.risk_reasons[0]}
          </div>
        )}
      </td>
      <td style={{ padding: "14px 16px", textAlign: "right", verticalAlign: "top" }} onClick={(e) => e.stopPropagation()}>
        {pending ? (
          <div style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--muted-foreground)", fontSize: 12 }}>
            <Icon name="loader" size={14} className="spin" />
            {pending === "start" ? "启动中" : pending === "stop" ? "停止中" : "解析中"}
          </div>
        ) : (
          <div className="row-actions" style={{ display: "inline-flex", gap: 4, opacity: 0.85, transition: "opacity 0.15s ease" }}>
            {canStart(site, pending) && <ActionButton tooltip="启动" icon="play" color="var(--color-success-strong)" onClick={() => onStart(site.site_id)} />}
            {canStop(site, pending) && <ActionButton tooltip="停止" icon="square" color="var(--color-warning-strong)" onClick={() => onStop(site.site_id)} />}
            {canParse(site, pending) && <ActionButton tooltip="解析" icon="refresh-cw" onClick={() => onParse(site.site_id)} />}
            {site.status === "Running" && <ActionButton tooltip="打开 Viewer" icon="eye" color="var(--color-info-strong)" onClick={() => onViewer(site)} />}
            <ActionButton tooltip="详情" icon="external-link" onClick={() => onOpenDetail(site.site_id)} />
            {canEdit(site, pending) && <ActionButton tooltip="编辑" icon="pencil" onClick={() => onEdit(site.site_id)} />}
            {canDelete(site, pending) && <ActionButton tooltip="删除" icon="trash-2" color="var(--destructive)" onClick={() => onDelete(site.site_id)} />}
          </div>
        )}
      </td>
    </tr>
  );

  const SiteDataTable = ({ sites, pendingActions, onOpenDetail, onStart, onStop, onParse, onEdit, onDelete, onViewer, empty }) => (
    <div className="card" style={{ overflow: "hidden" }}>
      {sites.length === 0 ? (
        <div style={{ padding: 80, display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
          <div style={{ width: 72, height: 72, borderRadius: 999, background: "var(--muted)", display: "grid", placeItems: "center" }}>
            <Icon name="folder-plus" size={32} color="var(--muted-foreground)" />
          </div>
          <div style={{ fontWeight: 500, fontSize: 16 }}>{empty?.title || "当前筛选结果为空"}</div>
          <div style={{ color: "var(--muted-foreground)", fontSize: 13, textAlign: "center", maxWidth: 440 }}>{empty?.detail || "试着清除筛选条件或导入新的站点。"}</div>
          {empty?.action}
        </div>
      ) : (
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: "var(--muted)", borderBottom: "1px solid var(--border)" }}>
              <th style={{ padding: "12px 16px", textAlign: "left", fontSize: 12, fontWeight: 500, color: "var(--muted-foreground)", width: 280 }}>项目名称</th>
              <th style={{ padding: "12px 16px", textAlign: "left", fontSize: 12, fontWeight: 500, color: "var(--muted-foreground)" }}>状态</th>
              <th style={{ padding: "12px 16px", textAlign: "left", fontSize: 12, fontWeight: 500, color: "var(--muted-foreground)", width: 160 }}>端口</th>
              <th style={{ padding: "12px 16px", textAlign: "left", fontSize: 12, fontWeight: 500, color: "var(--muted-foreground)", width: 160 }}>风险</th>
              <th style={{ padding: "12px 16px", textAlign: "right", fontSize: 12, fontWeight: 500, color: "var(--muted-foreground)", width: 260 }}>操作</th>
            </tr>
          </thead>
          <tbody>
            {sites.map((site) => (
              <SiteRow
                key={site.site_id}
                site={site}
                pending={pendingActions[site.site_id]}
                onOpenDetail={onOpenDetail}
                onStart={onStart}
                onStop={onStop}
                onParse={onParse}
                onEdit={onEdit}
                onDelete={onDelete}
                onViewer={onViewer}
              />
            ))}
          </tbody>
        </table>
      )}
    </div>
  );

  /* =========================================================================
     SitesView
     ========================================================================= */
  const computeStats = (sites) => {
    const total = sites.length;
    let running = 0, busy = 0, error = 0, pending_parse = 0;
    sites.forEach((s) => {
      if (s.status === "Running") running += 1;
      if (s.status === "Starting" || s.status === "Stopping" || s.parse_status === "Running") busy += 1;
      if (s.status === "Failed" || s.last_error) error += 1;
      if (s.parse_status === "Pending" && s.status !== "Running" && s.status !== "Starting") pending_parse += 1;
    });
    return { total, running, busy, error, pending_parse };
  };

  const matchesQuick = (s, f) => {
    switch (f) {
      case "all": return true;
      case "running": return s.status === "Running";
      case "busy": return s.status === "Starting" || s.status === "Stopping" || s.parse_status === "Running";
      case "error": return s.status === "Failed" || !!s.last_error;
      case "pending_parse": return s.parse_status === "Pending" && s.status !== "Running";
      default: return true;
    }
  };

  const filterSites = (sites, { quickFilter, search, statusFilter, riskFilter }) => {
    let list = sites;
    if (quickFilter !== "all") list = list.filter((s) => matchesQuick(s, quickFilter));
    if (search) {
      const q = search.toLowerCase();
      list = list.filter((s) => s.project_name.toLowerCase().includes(q) || s.site_id.toLowerCase().includes(q));
    }
    if (statusFilter) list = list.filter((s) => s.status === statusFilter);
    if (riskFilter) list = list.filter((s) => s.risk_level === riskFilter);
    return list;
  };

  const SitesView = ({ state, dispatch, onStart, onStop, onParse, onViewer }) => {
    const stats = useMemo(() => computeStats(state.sites), [state.sites]);
    const filtered = useMemo(() => filterSites(state.sites, state), [state.sites, state.quickFilter, state.search, state.statusFilter, state.riskFilter]);

    const emptyState = state.sites.length === 0
      ? { title: "还没有站点", detail: "首次进入工作台没有管理过的站点。导入第一个项目，平台会自动分配端口、解析 DESI / SYST 并生成 Viewer 链接。", action: <button className="btn btn-primary" onClick={() => dispatch({ type: "OPEN_DRAWER", mode: "create" })}><Icon name="plus" size={14} /> 新建第一个站点</button> }
      : filtered.length === 0
      ? { title: "当前筛选结果为空", detail: "试着清除筛选条件或搜索其他关键字。", action: <button className="btn btn-outline" onClick={() => { dispatch({ type: "SET_QUICK_FILTER", filter: "all" }); dispatch({ type: "SET_SEARCH", value: "" }); dispatch({ type: "SET_STATUS_FILTER", value: "" }); dispatch({ type: "SET_RISK_FILTER", value: "" }); }}>清除筛选</button> }
      : null;

    return (
      <div style={{ padding: 32, display: "flex", flexDirection: "column", gap: 24 }}>
        <WorkbenchHeader
          total={stats.total}
          filtered={filtered.length}
          lastRefresh={state.lastRefresh}
          onRefresh={() => dispatch({ type: "REFRESH" })}
        />
        <StatsGrid stats={stats} filteredCount={filtered.length} />
        <ResourceSection risk={state.resourceRisk} />
        <SiteToolbar
          quickFilter={state.quickFilter}
          onQuickFilter={(f) => dispatch({ type: "SET_QUICK_FILTER", filter: f })}
          search={state.search}
          onSearch={(v) => dispatch({ type: "SET_SEARCH", value: v })}
          statusFilter={state.statusFilter}
          onStatusFilter={(v) => dispatch({ type: "SET_STATUS_FILTER", value: v })}
          riskFilter={state.riskFilter}
          onRiskFilter={(v) => dispatch({ type: "SET_RISK_FILTER", value: v })}
          onNew={() => dispatch({ type: "OPEN_DRAWER", mode: "create" })}
        />
        <SiteDataTable
          sites={filtered}
          pendingActions={state.pendingActions}
          empty={emptyState}
          onOpenDetail={(id) => dispatch({ type: "OPEN_DETAIL", siteId: id })}
          onStart={onStart}
          onStop={onStop}
          onParse={onParse}
          onEdit={(id) => dispatch({ type: "OPEN_DRAWER", mode: "edit", siteId: id })}
          onDelete={(id) => dispatch({ type: "OPEN_DIALOG", dialog: { type: "delete", siteId: id } })}
          onViewer={onViewer}
        />
      </div>
    );
  };

  /* =========================================================================
     Toast
     ========================================================================= */
  const Toast = ({ toast, onClose }) => {
    useEffect(() => {
      if (!toast) return;
      const t = setTimeout(onClose, 3200);
      return () => clearTimeout(t);
    }, [toast, onClose]);
    if (!toast) return null;
    const iconName = toast.tone === "success" ? "shield-check" : toast.tone === "error" ? "circle-alert" : "triangle-alert";
    const color = toast.tone === "success" ? "var(--color-success-strong)" : toast.tone === "error" ? "var(--color-error-strong)" : "var(--color-warning-strong)";
    return (
      <div className="toast-layer">
        <div className="toast-card">
          <Icon name={iconName} size={18} color={color} style={{ marginTop: 1 }} />
          <div style={{ flex: 1, fontSize: 13 }}>{toast.message}</div>
          <button className="icon-btn" onClick={onClose} style={{ width: 22, height: 22 }}>
            <Icon name="x" size={12} />
          </button>
        </div>
      </div>
    );
  };

  /* =========================================================================
     Devtools (risk switcher)
     ========================================================================= */
  const Devtools = ({ risk, onRisk, onReset }) => (
    <div className="devtools">
      <div><strong>Devtools</strong> · 仅演示用</div>
      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
        <span style={{ color: "#A1A1AA" }}>机器风险</span>
        {["normal","warning","critical"].map((k) => (
          <button key={k} className={risk === k ? "on" : ""} onClick={() => onRisk(k)}>{RISK_LABEL[k]}</button>
        ))}
      </div>
      <button onClick={onReset} style={{ background: "rgba(220,38,38,0.22)" }}>重置数据</button>
    </div>
  );

  /* =========================================================================
     App (Phase A + B + partial E — list + toasts + devtools wired)
     Drawer / Detail / Dialog — placeholders until Phase C + D + E fully landed.
     ========================================================================= */
  const App = () => {
    const [state, dispatch] = useReducer(reducer, null, initialState);

    /* scale stage to viewport */
    const contentRef = useRef(null);
    useEffect(() => {
      const handle = () => {
        const el = contentRef.current;
        if (!el) return;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const design = 1440;
        const scale = Math.min(vw / design, vh / 900, 1);
        el.style.transform = `scale(${scale})`;
        el.style.width = `${design}px`;
      };
      handle();
      window.addEventListener("resize", handle);
      return () => window.removeEventListener("resize", handle);
    }, []);

    /* mock async actions */
    const runAction = (siteId, action, { willFail, delay = 1500 } = {}) => {
      if (state.pendingActions[siteId]) return;
      dispatch({ type: "START_PENDING", siteId, action });
      setTimeout(() => {
        if (willFail) {
          dispatch({ type: "FAIL_ACTION", siteId, action, message: `${action === "start" ? "启动" : action === "stop" ? "停止" : "解析"}失败：端口 ${state.sites.find((s) => s.site_id === siteId)?.web_port} 被占用 (PID 42198)` });
        } else {
          dispatch({ type: "END_PENDING", siteId, action });
        }
      }, delay);
    };

    const onStart = (siteId, e) => runAction(siteId, "start", { willFail: e?.shiftKey });
    const onStop = (siteId) => runAction(siteId, "stop");
    const onParse = (siteId) => runAction(siteId, "parse", { delay: 2200 });
    const onViewer = (site) => {
      dispatch({ type: "HIDE_TOAST" });
      setTimeout(() => dispatch({ type: "REFRESH" }), 0);
      alert(`演示原型 · 这里会打开 Viewer：\n${site.entry_url || site.local_entry_url}`);
    };

    const currentSite = state.sites.find((s) => s.site_id === state.detailSiteId);

    return (
      <div className="stage-viewport">
        <div className="stage-content" ref={contentRef}>
          {state.route === "list" && (
            <SitesView state={state} dispatch={dispatch} onStart={onStart} onStop={onStop} onParse={onParse} onViewer={onViewer} />
          )}
          {state.route === "detail" && currentSite && (
            <DetailPlaceholder site={currentSite} state={state} dispatch={dispatch} onStart={onStart} onStop={onStop} onParse={onParse} onViewer={onViewer} />
          )}
        </div>
        {state.drawer.open && <DrawerPlaceholder state={state} dispatch={dispatch} />}
        {state.dialog?.type === "delete" && <DeleteDialogImpl state={state} dispatch={dispatch} />}
        <Toast toast={state.toast} onClose={() => dispatch({ type: "HIDE_TOAST" })} />
        <Devtools
          risk={state.resourceRisk}
          onRisk={(r) => dispatch({ type: "SET_RESOURCE_RISK", risk: r })}
          onReset={() => { if (confirm("重置所有演示数据？")) window.location.reload(); }}
        />
      </div>
    );
  };

  /* =========================================================================
     Placeholder components (filled in next phases).
     ========================================================================= */
  const DrawerPlaceholder = ({ state, dispatch }) => (
    <Fragment>
      <div className="drawer-overlay" onClick={() => dispatch({ type: "CLOSE_DRAWER" })} />
      <div className="drawer-panel">
        <div style={{ padding: 24, display: "flex", justifyContent: "space-between", borderBottom: "1px solid var(--border)" }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 18 }}>{state.drawer.mode === "edit" ? "编辑站点" : "新建站点"}</div>
            <div style={{ color: "var(--muted-foreground)", fontSize: 13, marginTop: 4 }}>Phase C 即将补充完整表单</div>
          </div>
          <button className="icon-btn" onClick={() => dispatch({ type: "CLOSE_DRAWER" })}><Icon name="x" size={16} /></button>
        </div>
        <div style={{ padding: 24, color: "var(--muted-foreground)", fontSize: 13 }}>
          待填充：项目信息 / 运行配置 / 解析范围 / 数据库凭据（将在下个阶段补齐）。
        </div>
      </div>
    </Fragment>
  );

  const DetailPlaceholder = ({ site, dispatch }) => (
    <div style={{ padding: 32, display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
        <button className="icon-btn" style={{ width: 32, height: 32 }} onClick={() => dispatch({ type: "BACK_TO_LIST" })}>
          <Icon name="arrow-left" size={16} />
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <h1 style={{ margin: 0, fontSize: 24, fontWeight: 600 }}>{site.project_name}</h1>
            <Chip tone={STATUS_TONE[site.status]}>{STATUS_LABEL[site.status]}</Chip>
          </div>
          <div style={{ color: "var(--muted-foreground)", fontSize: 13, fontFamily: "var(--font-mono)" }}>{site.site_id}</div>
        </div>
      </div>
      <div className="card" style={{ padding: 32, color: "var(--muted-foreground)", fontSize: 13 }}>
        Phase D 将在此补齐运行概览 / 配置信息 Tab（Runtime 卡 / 解析计划 / 风险摘要 / 进程资源 / 日志面板）。
      </div>
    </div>
  );

  const DeleteDialogImpl = ({ state, dispatch }) => {
    const site = state.sites.find((s) => s.site_id === state.dialog.siteId);
    if (!site) return null;
    return (
      <div className="dialog-overlay" onClick={() => dispatch({ type: "CLOSE_DIALOG" })}>
        <div className="dialog-panel" onClick={(e) => e.stopPropagation()} style={{ padding: 24, display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ width: 40, height: 40, borderRadius: 999, background: "var(--color-error)", display: "grid", placeItems: "center" }}>
              <Icon name="trash-2" size={20} color="var(--color-error-strong)" />
            </div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 18 }}>删除站点</div>
              <div style={{ color: "var(--muted-foreground)", fontSize: 12 }}>此操作不可撤销，请确认后继续</div>
            </div>
          </div>
          <div style={{ fontSize: 14, color: "var(--foreground)", lineHeight: 1.5 }}>
            确定删除站点「<strong>{site.project_name}</strong>」吗？
            <br /><br />
            该站点的运行目录 ({fmtBytes(site.runtime_dir_bytes)})、解析数据 ({fmtBytes(site.data_dir_bytes)})、日志文件 ({fmtBytes(site.log_bytes)}) 将一同移除。
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <button className="btn btn-outline" onClick={() => dispatch({ type: "CLOSE_DIALOG" })}>取消</button>
            <button className="btn btn-destructive" onClick={() => dispatch({ type: "CONFIRM_DELETE", siteId: site.site_id })}>
              <Icon name="trash-2" size={14} /> 确认删除
            </button>
          </div>
        </div>
      </div>
    );
  };

  /* =========================================================================
     Mount
     ========================================================================= */
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
