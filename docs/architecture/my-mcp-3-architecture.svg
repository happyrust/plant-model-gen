<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .layer-title { font-size: 13px; font-weight: 700; fill: #374151; }
    .node-title { font-size: 15px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .small { font-size: 11px; fill: #6b7280; }
    .label { font-size: 11px; fill: #374151; }
    .container { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 14; ry: 14; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 10; ry: 10; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" class="title">my-mcp-3 Session Collaboration Architecture</text>
  <text x="600" y="66" text-anchor="middle" class="subtitle">check_messages is both the turn boundary and the inbound-message gate for multi-session coordination.</text>

  <rect x="44" y="96" width="1112" height="104" class="container"/>
  <text x="64" y="120" class="layer-title">Entry Layer</text>
  <rect x="92" y="132" width="190" height="48" class="box blue" filter="url(#shadow)"/>
  <text x="187" y="153" text-anchor="middle" class="node-title">User / Cursor</text>
  <text x="187" y="170" text-anchor="middle" class="node-sub">input, visible reply, context</text>
  <rect x="394" y="132" width="210" height="48" class="box purple" filter="url(#shadow)"/>
  <text x="499" y="153" text-anchor="middle" class="node-title">Agent Loop</text>
  <text x="499" y="170" text-anchor="middle" class="node-sub">understand, tool, reply, heartbeat</text>
  <rect x="716" y="132" width="230" height="48" class="box orange" filter="url(#shadow)"/>
  <text x="831" y="153" text-anchor="middle" class="node-title">Tool Schema</text>
  <text x="831" y="170" text-anchor="middle" class="node-sub">read JSON contract before calls</text>

  <rect x="44" y="236" width="1112" height="196" class="container"/>
  <text x="64" y="260" class="layer-title">my-mcp-3 Service Layer</text>
  <rect x="88" y="286" width="220" height="74" class="box blue" filter="url(#shadow)"/>
  <text x="198" y="310" text-anchor="middle" class="node-title">check_messages</text>
  <text x="198" y="328" text-anchor="middle" class="node-sub">final heartbeat and message drain</text>
  <text x="198" y="346" text-anchor="middle" class="small">turn_complete must be true</text>
  <rect x="382" y="286" width="204" height="74" class="box teal" filter="url(#shadow)"/>
  <text x="484" y="310" text-anchor="middle" class="node-title">Session Router</text>
  <text x="484" y="328" text-anchor="middle" class="node-sub">session state and target ids</text>
  <text x="484" y="346" text-anchor="middle" class="small">list_sessions / send_to_session</text>
  <rect x="674" y="286" width="206" height="74" class="box orange" filter="url(#shadow)"/>
  <text x="777" y="310" text-anchor="middle" class="node-title">Task Orchestrator</text>
  <text x="777" y="328" text-anchor="middle" class="node-sub">dispatch, report, query status</text>
  <text x="777" y="346" text-anchor="middle" class="small">dispatch_task / report_task</text>
  <rect x="954" y="286" width="162" height="74" class="box green" filter="url(#shadow)"/>
  <text x="1035" y="310" text-anchor="middle" class="node-title">Progress Store</text>
  <text x="1035" y="328" text-anchor="middle" class="node-sub">task state and findings</text>
  <text x="1035" y="346" text-anchor="middle" class="small">save / load / send</text>

  <rect x="88" y="496" width="224" height="78" class="box gray" filter="url(#shadow)"/>
  <text x="200" y="521" text-anchor="middle" class="node-title">Inbound Queue</text>
  <text x="200" y="539" text-anchor="middle" class="node-sub">user messages and reports</text>
  <text x="200" y="557" text-anchor="middle" class="small">returned content is next input</text>
  <rect x="394" y="496" width="206" height="78" class="box gray" filter="url(#shadow)"/>
  <text x="497" y="521" text-anchor="middle" class="node-title">Peer MCP Sessions</text>
  <text x="497" y="539" text-anchor="middle" class="node-sub">workers and peer agents</text>
  <text x="497" y="557" text-anchor="middle" class="small">one task at a time</text>
  <rect x="688" y="496" width="190" height="78" class="box gray" filter="url(#shadow)"/>
  <text x="783" y="521" text-anchor="middle" class="node-title">Plugin Panel</text>
  <text x="783" y="539" text-anchor="middle" class="node-sub">reply and progress display</text>
  <text x="783" y="557" text-anchor="middle" class="small">does not replace chat reply</text>
  <rect x="960" y="496" width="158" height="78" class="box gray" filter="url(#shadow)"/>
  <text x="1039" y="521" text-anchor="middle" class="node-title">Long Context</text>
  <text x="1039" y="539" text-anchor="middle" class="node-sub">recoverable task notes</text>
  <text x="1039" y="557" text-anchor="middle" class="small">migrate stable facts to docs</text>

  <path d="M 282 156 L 394 156" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="322" y="144" width="40" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="342" y="157" text-anchor="middle" class="label">input</text>
  <path d="M 604 156 L 716 156" stroke="#059669" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="638" y="144" width="58" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="667" y="157" text-anchor="middle" class="label">schema</text>
  <path d="M 499 180 L 198 286" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="327" y="220" width="86" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="370" y="233" text-anchor="middle" class="label">turn done</text>

  <path d="M 308 323 L 382 323" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="325" y="311" width="48" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="349" y="324" text-anchor="middle" class="label">poll</text>
  <path d="M 586 323 L 674 323" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="608" y="311" width="56" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="636" y="324" text-anchor="middle" class="label">assign</text>
  <path d="M 880 323 L 954 323" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="898" y="311" width="40" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="918" y="324" text-anchor="middle" class="label">save</text>

  <path d="M 198 360 L 200 496" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="158" y="418" width="86" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="201" y="431" text-anchor="middle" class="label">drain queue</text>
  <path d="M 382 535 L 312 535" stroke="#6b7280" stroke-width="1.6" stroke-dasharray="4 2" fill="none" marker-end="url(#arrow-gray)"/>
  <rect x="326" y="523" width="50" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="351" y="536" text-anchor="middle" class="label">report</text>
  <path d="M 777 360 C 777 420 596 438 497 496" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="619" y="422" width="64" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="651" y="435" text-anchor="middle" class="label">dispatch</text>
  <path d="M 1035 360 L 1039 496" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="1002" y="421" width="74" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="1039" y="434" text-anchor="middle" class="label">read/write</text>
  <path d="M 1035 360 C 980 422 884 445 783 496" stroke="#059669" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="892" y="434" width="84" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="934" y="447" text-anchor="middle" class="label">progress UI</text>
  <path d="M 200 574 C 214 654 450 688 499 574" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="299" y="652" width="114" height="18" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="356" y="665" text-anchor="middle" class="label">next turn input</text>

  <rect x="64" y="624" width="422" height="92" rx="10" ry="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="84" y="648" class="layer-title">Key Invariants</text>
  <text x="84" y="670" class="small">1. Read JSON schema before calling MCP tools.</text>
  <text x="84" y="690" class="small">2. End each visible reply with check_messages({ turn_complete: true }).</text>
  <text x="84" y="710" class="small">3. Returned content is inbound input, not a status summary.</text>

  <g transform="translate(800, 624)">
    <rect x="0" y="0" width="336" height="92" rx="10" ry="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="18" y="24" class="layer-title">Legend</text>
    <line x1="20" y1="44" x2="64" y2="44" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="78" y="48" class="small">Primary request / message flow</text>
    <line x1="20" y1="62" x2="64" y2="62" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
    <text x="78" y="66" class="small">Task-control flow</text>
    <line x1="20" y1="80" x2="64" y2="80" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
    <text x="78" y="84" class="small">Progress / memory write</text>
  </g>
</svg>
