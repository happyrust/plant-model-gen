# gRPC-Web Proxy Configuration
# This proxy enables web browsers to communicate with gRPC services

# Backend gRPC service configuration
backend:
  host: localhost
  port: 50051
  tls: false

# gRPC-Web proxy server configuration
proxy:
  # The port on which the proxy will listen for gRPC-Web requests
  port: 8080
  
  # Enable CORS for browser access
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
    allowed_methods:
      - GET
      - POST
      - OPTIONS
    allowed_headers:
      - "*"
    exposed_headers:
      - "grpc-status"
      - "grpc-message"
      - "grpc-status-details-bin"
    max_age: 3600

# Logging configuration
logging:
  level: info
  format: json

# Performance tuning
performance:
  max_receive_message_size: 10485760  # 10MB
  max_send_message_size: 10485760     # 10MB
  keepalive:
    time: 60s
    timeout: 20s
    permit_without_stream: true

# Security settings
security:
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst: 200
  
  # Request timeout
  request_timeout: 30s