syntax = "proto3";

package progress_service;

// 进度服务
service ProgressService {
  // 获取解析进度流
  rpc GetProgressStream(ProgressRequest) returns (stream ProgressResponse);
  
  // 获取MDB列表
  rpc GetMdbList(MdbListRequest) returns (MdbListResponse);
  
  // 获取MDB详情
  rpc GetMdbDetails(MdbDetailsRequest) returns (MdbDetailsResponse);
  
  // 启动解析任务
  rpc StartParseTask(StartTaskRequest) returns (TaskResponse);
  
  // 停止解析任务
  rpc StopParseTask(StopTaskRequest) returns (TaskResponse);
  
  // 获取任务状态
  rpc GetTaskStatus(TaskStatusRequest) returns (TaskStatusResponse);
  
  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// 进度请求
message ProgressRequest {
  string task_id = 1;
}

// 进度响应
message ProgressResponse {
  string task_id = 1;
  float progress = 2;
  TaskStatus status = 3;
  string message = 4;
  int64 timestamp = 5;
  optional ProgressDetails details = 6;
}

// 进度详情
message ProgressDetails {
  string current_step = 1;
  uint32 total_steps = 2;
  uint32 current_step_index = 3;
  uint64 processed_items = 4;
  uint64 total_items = 5;
  repeated string errors = 6;
}

// 任务状态枚举
enum TaskStatus {
  TASK_STATUS_PENDING = 0;
  TASK_STATUS_RUNNING = 1;
  TASK_STATUS_COMPLETED = 2;
  TASK_STATUS_FAILED = 3;
  TASK_STATUS_CANCELLED = 4;
}

// 任务类型枚举
enum TaskType {
  TASK_TYPE_FULL_SYNC = 0;
  TASK_TYPE_INCREMENTAL_SYNC = 1;
  TASK_TYPE_MODEL_GENERATION = 2;
  TASK_TYPE_SPATIAL_TREE_GENERATION = 3;
}

// 任务优先级枚举
enum TaskPriority {
  TASK_PRIORITY_LOW = 0;
  TASK_PRIORITY_NORMAL = 1;
  TASK_PRIORITY_HIGH = 2;
  TASK_PRIORITY_CRITICAL = 3;
}

// MDB列表请求
message MdbListRequest {
  optional bool force_refresh = 1;
}

// MDB列表响应
message MdbListResponse {
  repeated MdbInfo mdbs = 1;
}

// MDB详情请求
message MdbDetailsRequest {
  string mdb_name = 1;
}

// MDB详情响应
message MdbDetailsResponse {
  optional MdbInfo mdb = 1;
}

// MDB信息
message MdbInfo {
  string name = 1;
  uint64 refno = 2;
  string path = 3;
  uint64 size = 4;
  int64 created_at = 5;
  int64 modified_at = 6;
  repeated DbFileInfo db_files = 7;
  MdbMetadata metadata = 8;
}

// DB文件信息
message DbFileInfo {
  uint32 db_num = 1;
  string name = 2;
  uint64 size = 3;
  DbFileStatus status = 4;
}

// DB文件状态枚举
enum DbFileStatus {
  DB_FILE_STATUS_AVAILABLE = 0;
  DB_FILE_STATUS_PROCESSING = 1;
  DB_FILE_STATUS_COMPLETED = 2;
  DB_FILE_STATUS_ERROR = 3;
}

// MDB元数据
message MdbMetadata {
  string version = 1;
  string description = 2;
  repeated string tags = 3;
  map<string, string> properties = 4;
}

// 启动任务请求
message StartTaskRequest {
  string mdb_name = 1;
  TaskType task_type = 2;
  repeated uint32 db_files = 3;
  TaskOptions options = 4;
  TaskPriority priority = 5;
}

// 任务选项
message TaskOptions {
  bool enable_logging = 1;
  bool generate_models = 2;
  bool build_spatial_tree = 3;
  bool sync_team_data = 4;
}

// 任务响应
message TaskResponse {
  string task_id = 1;
  bool success = 2;
  string message = 3;
}

// 停止任务请求
message StopTaskRequest {
  string task_id = 1;
}

// 任务状态请求
message TaskStatusRequest {
  string task_id = 1;
}

// 任务状态响应
message TaskStatusResponse {
  string task_id = 1;
  TaskStatus status = 2;
  float progress = 3;
  string message = 4;
  int64 start_time = 5;
  optional int64 estimated_completion = 6;
}

// 健康检查请求
message HealthCheckRequest {
  string service = 1;
}

// 健康检查响应
message HealthCheckResponse {
  HealthStatus status = 1;
  string message = 2;
  map<string, string> details = 3;
}

// 健康状态枚举
enum HealthStatus {
  HEALTH_STATUS_UNKNOWN = 0;
  HEALTH_STATUS_SERVING = 1;
  HEALTH_STATUS_NOT_SERVING = 2;
  HEALTH_STATUS_SERVICE_UNKNOWN = 3;
}