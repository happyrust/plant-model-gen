<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部署站点管理演示 - AIOS 平台</title>
    <link href="/static/simple-tailwind.css" rel="stylesheet">
    <link href="/static/simple-icons.css" rel="stylesheet">
    <script src="/static/alpine.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 导航栏 -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-server text-2xl"></i>
                        <h1 class="text-xl font-bold">部署站点管理 (演示)</h1>
                    </div>
                    <div class="flex space-x-4">
                        <a href="/" class="hover:bg-blue-700 px-3 py-2 rounded">
                            <i class="fas fa-home mr-2"></i>首页
                        </a>
                        <a href="/tasks" class="hover:bg-blue-700 px-3 py-2 rounded">
                            <i class="fas fa-tasks mr-2"></i>任务管理
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主要内容 -->
        <div class="max-w-7xl mx-auto px-4 py-8" x-data="deploymentSitesDemo()">
            <!-- 演示说明 -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <div class="flex items-center">
                    <i class="fas fa-info-circle text-yellow-600 mr-2"></i>
                    <p class="text-yellow-800">
                        <strong>演示模式</strong>：由于数据库连接问题，这里展示的是部署站点功能的静态演示。所有数据都是模拟数据。
                    </p>
                </div>
            </div>

            <!-- 页面标题和操作按钮 -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">部署站点管理</h2>
                <button @click="showCreateModal = true" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md">
                    <i class="fas fa-plus mr-2"></i>新增部署站点
                </button>
            </div>

            <!-- 搜索和过滤 -->
            <div class="bg-white rounded-lg shadow-md p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">搜索</label>
                        <input type="text" x-model="searchQuery" @input="filterSites()"
                               placeholder="站点名称、负责人..." 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <select x-model="statusFilter" @change="filterSites()"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md">
                            <option value="">全部状态</option>
                            <option value="Configuring">配置中</option>
                            <option value="Running">运行中</option>
                            <option value="Failed">失败</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">环境</label>
                        <select x-model="envFilter" @change="filterSites()"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md">
                            <option value="">全部环境</option>
                            <option value="prod">生产环境</option>
                            <option value="staging">测试环境</option>
                            <option value="dev">开发环境</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button @click="loadDemoData()" 
                                class="w-full bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md">
                            <i class="fas fa-refresh mr-2"></i>刷新
                        </button>
                    </div>
                </div>
            </div>

            <!-- 站点列表 -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">站点信息</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">环境</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">E3D项目</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">负责人</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <template x-for="site in filteredSites" :key="site.id">
                                <tr class="hover:bg-gray-50">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div>
                                            <div class="text-sm font-medium text-gray-900" x-text="site.name"></div>
                                            <div class="text-sm text-gray-500" x-text="site.description"></div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full"
                                              :class="getStatusColor(site.status)" x-text="getStatusText(site.status)">
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="site.env"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="site.projectCount"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="site.owner"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="site.createdAt"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                        <button @click="viewSiteDetail(site)" 
                                                class="text-blue-600 hover:text-blue-900">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                        <button @click="createSiteTask(site)" 
                                                class="text-green-600 hover:text-green-900">
                                            <i class="fas fa-play"></i>
                                        </button>
                                        <button @click="deleteSite(site)" 
                                                class="text-red-600 hover:text-red-900">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 创建站点模态框 -->
            <div x-show="showCreateModal" x-cloak 
                 class="fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 w-full max-w-2xl max-h-screen overflow-y-auto">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-medium">创建部署站点</h3>
                        <button @click="showCreateModal = false" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <form @submit.prevent="createSite()">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">站点名称 *</label>
                                <input type="text" x-model="newSite.name" required
                                       class="w-full px-3 py-2 border border-gray-300 rounded-md">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">站点描述</label>
                                <textarea x-model="newSite.description" rows="3"
                                          class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">环境</label>
                                    <select x-model="newSite.env" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                                        <option value="dev">开发环境</option>
                                        <option value="staging">测试环境</option>
                                        <option value="prod">生产环境</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">负责人</label>
                                    <input type="text" x-model="newSite.owner"
                                           class="w-full px-3 py-2 border border-gray-300 rounded-md">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">E3D项目路径 (每行一个)</label>
                                <textarea x-model="newSite.projectPaths" rows="4"
                                          placeholder="/path/to/project1&#10;/path/to/project2"
                                          class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                            </div>
                        </div>
                        
                        <div class="flex justify-end mt-6 space-x-3">
                            <button type="button" @click="showCreateModal = false"
                                    class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                                取消
                            </button>
                            <button type="submit" 
                                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                                创建站点 (演示)
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 任务创建模态框 -->
            <div x-show="showTaskModal" x-cloak 
                 class="fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 w-full max-w-md">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-medium">为站点创建任务</h3>
                        <button @click="showTaskModal = false" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <form @submit.prevent="submitCreateTask()">
                        <div class="space-y-4">
                            <div>
                                <p class="text-sm text-gray-600 mb-2">站点: <span x-text="selectedSite?.name" class="font-medium"></span></p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">任务类型</label>
                                <select x-model="taskRequest.task_type" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                                    <option value="DataGeneration">数据生成</option>
                                    <option value="SpatialTreeGeneration">空间树生成</option>
                                    <option value="FullGeneration">完整生成</option>
                                    <option value="ParsePdmsData">解析PDMS数据</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">任务优先级</label>
                                <select x-model="taskRequest.priority" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                                    <option value="Low">低</option>
                                    <option value="Normal">普通</option>
                                    <option value="High">高</option>
                                    <option value="Urgent">紧急</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="flex justify-end mt-6 space-x-3">
                            <button type="button" @click="showTaskModal = false"
                                    class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                                取消
                            </button>
                            <button type="submit" 
                                    class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
                                创建任务 (演示)
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function deploymentSitesDemo() {
            return {
                // 演示数据
                sites: [
                    {
                        id: 'demo1',
                        name: '海洋工程项目站点',
                        description: '包含船体、甲板和机舱等多个E3D项目',
                        status: 'Running',
                        env: 'prod',
                        projectCount: 5,
                        owner: '张工程师',
                        createdAt: '2025-09-01 10:30:00'
                    },
                    {
                        id: 'demo2', 
                        name: '测试环境站点',
                        description: '用于功能测试的部署站点',
                        status: 'Configuring',
                        env: 'staging',
                        projectCount: 3,
                        owner: '李测试',
                        createdAt: '2025-09-05 14:20:00'
                    },
                    {
                        id: 'demo3',
                        name: '开发环境站点',
                        description: '开发人员使用的本地站点',
                        status: 'Failed',
                        env: 'dev',
                        projectCount: 2,
                        owner: '王开发',
                        createdAt: '2025-09-08 09:15:00'
                    }
                ],
                filteredSites: [],
                
                // 搜索和过滤
                searchQuery: '',
                statusFilter: '',
                envFilter: '',
                
                // 模态框状态
                showCreateModal: false,
                showTaskModal: false,
                selectedSite: null,
                
                // 新站点数据
                newSite: {
                    name: '',
                    description: '',
                    env: 'dev',
                    owner: '',
                    projectPaths: ''
                },
                
                // 任务请求数据
                taskRequest: {
                    task_type: 'DataGeneration',
                    priority: 'Normal'
                },
                
                init() {
                    this.filteredSites = [...this.sites];
                },
                
                loadDemoData() {
                    // 模拟刷新数据
                    this.showNotification('演示数据已刷新', 'success');
                    this.filterSites();
                },
                
                filterSites() {
                    this.filteredSites = this.sites.filter(site => {
                        const matchesSearch = !this.searchQuery || 
                            site.name.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                            site.owner.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesStatus = !this.statusFilter || site.status === this.statusFilter;
                        const matchesEnv = !this.envFilter || site.env === this.envFilter;
                        
                        return matchesSearch && matchesStatus && matchesEnv;
                    });
                },
                
                createSite() {
                    // 模拟创建站点
                    const projectCount = this.newSite.projectPaths.split('\n').filter(p => p.trim()).length;
                    const newSite = {
                        id: 'demo' + Date.now(),
                        name: this.newSite.name,
                        description: this.newSite.description || '无描述',
                        status: 'Configuring',
                        env: this.newSite.env,
                        projectCount: projectCount,
                        owner: this.newSite.owner || '未指定',
                        createdAt: new Date().toLocaleString('zh-CN')
                    };
                    
                    this.sites.unshift(newSite);
                    this.filterSites();
                    this.showCreateModal = false;
                    this.resetNewSiteForm();
                    this.showNotification('演示站点创建成功！', 'success');
                },
                
                resetNewSiteForm() {
                    this.newSite = {
                        name: '',
                        description: '',
                        env: 'dev',
                        owner: '',
                        projectPaths: ''
                    };
                },
                
                viewSiteDetail(site) {
                    alert(`站点详情：\n\n名称：${site.name}\n描述：${site.description}\n状态：${this.getStatusText(site.status)}\n环境：${site.env}\nE3D项目数：${site.projectCount}\n负责人：${site.owner}`);
                },
                
                createSiteTask(site) {
                    this.selectedSite = site;
                    this.showTaskModal = true;
                },
                
                submitCreateTask() {
                    this.showTaskModal = false;
                    this.showNotification(`已为站点 "${this.selectedSite.name}" 创建 ${this.taskRequest.task_type} 任务（演示）`, 'success');
                },
                
                deleteSite(site) {
                    if (confirm(`确定要删除站点 "${site.name}" 吗？`)) {
                        const index = this.sites.findIndex(s => s.id === site.id);
                        if (index !== -1) {
                            this.sites.splice(index, 1);
                            this.filterSites();
                            this.showNotification('演示站点删除成功', 'success');
                        }
                    }
                },
                
                getStatusColor(status) {
                    const colors = {
                        'Configuring': 'bg-yellow-100 text-yellow-800',
                        'Running': 'bg-green-100 text-green-800',
                        'Failed': 'bg-red-100 text-red-800'
                    };
                    return colors[status] || 'bg-gray-100 text-gray-800';
                },
                
                getStatusText(status) {
                    const texts = {
                        'Configuring': '配置中',
                        'Running': '运行中',
                        'Failed': '失败'
                    };
                    return texts[status] || status;
                },
                
                showNotification(message, type = 'info') {
                    // 创建通知元素
                    const notification = document.createElement('div');
                    notification.className = `fixed top-4 right-4 p-4 rounded-md shadow-lg z-50 ${
                        type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' :
                        type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' :
                        'bg-blue-100 text-blue-800 border border-blue-200'
                    }`;
                    notification.innerHTML = `
                        <div class="flex items-center">
                            <i class="fas ${
                                type === 'success' ? 'fa-check-circle' :
                                type === 'error' ? 'fa-exclamation-circle' :
                                'fa-info-circle'
                            } mr-2"></i>
                            <span>${message}</span>
                            <button onclick="this.parentElement.parentElement.remove()" class="ml-2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                    
                    document.body.appendChild(notification);
                    
                    // 3秒后自动移除
                    setTimeout(() => {
                        if (notification.parentElement) {
                            notification.remove();
                        }
                    }, 3000);
                }
            };
        }
    </script>
</body>
</html>
