<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一空间查询工具 - AIOS Database</title>
    <script src="/static/grpc-client.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .interface-selector {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .interface-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .interface-option input[type="radio"] {
            width: 18px;
            height: 18px;
        }
        
        .interface-option label {
            font-weight: 500;
            cursor: pointer;
        }
        
        .status-indicator {
            margin-left: auto;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-indicator.http { background: #10b981; color: white; }
        .status-indicator.grpc { background: #3b82f6; color: white; }
        
        .main-content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }
        
        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .query-panel h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .api-info {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .api-info h3 {
            margin-bottom: 10px;
            color: #1f2937;
        }
        
        .api-endpoint {
            font-family: 'Courier New', monospace;
            background: #1f2937;
            color: #10b981;
            padding: 8px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 13px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .input-row input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .results-panel h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .comparison-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .result-section {
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
        }
        
        .result-section h3 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .method-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .method-badge.http { background: #10b981; color: white; }
        .method-badge.grpc { background: #3b82f6; color: white; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }
        
        .results-list {
            max-height: 400px;
            overflow-y: auto;
            background: white;
            border-radius: 6px;
            padding: 10px;
        }
        
        .result-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .result-item:hover {
            background: #e5e7eb;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 900;
            justify-content: center;
            align-items: center;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .comparison-toggle {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 28px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #667eea;
        }
        
        input:checked + .slider:before {
            transform: translateX(32px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 统一空间查询工具</h1>
            <p>支持 HTTP REST API 和 gRPC 两种接口</p>
        </div>
        
        <!-- 接口选择器 -->
        <div class="interface-selector">
            <div class="interface-option">
                <input type="radio" id="use-http" name="interface" value="http" checked>
                <label for="use-http">HTTP REST API</label>
            </div>
            <div class="interface-option">
                <input type="radio" id="use-grpc" name="interface" value="grpc">
                <label for="use-grpc">gRPC Service</label>
            </div>
            <div class="interface-option">
                <input type="radio" id="use-both" name="interface" value="both">
                <label for="use-both">对比测试</label>
            </div>
            <div class="status-indicator http" id="status-indicator">
                使用 HTTP API
            </div>
        </div>
        
        <div class="main-content">
            <!-- 查询面板 -->
            <div class="panel query-panel">
                <h2>查询参数</h2>
                
                <!-- API 信息 -->
                <div class="api-info" id="api-info">
                    <h3>当前接口</h3>
                    <div class="api-endpoint" id="api-endpoint">
                        GET /api/sqlite-spatial/query
                    </div>
                    <div style="margin-top: 10px; font-size: 13px; color: #6b7280;">
                        <strong>特点：</strong>
                        <span id="api-features">简单易用，适合浏览器直接调用</span>
                    </div>
                </div>
                
                <!-- 查询参数 -->
                <div class="input-group">
                    <label>X 轴范围 (mm)</label>
                    <div class="input-row">
                        <input type="number" id="minx" placeholder="最小值" value="-1000">
                        <input type="number" id="maxx" placeholder="最大值" value="1000">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Y 轴范围 (mm)</label>
                    <div class="input-row">
                        <input type="number" id="miny" placeholder="最小值" value="-1000">
                        <input type="number" id="maxy" placeholder="最大值" value="1000">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Z 轴范围 (mm)</label>
                    <div class="input-row">
                        <input type="number" id="minz" placeholder="最小值" value="-1000">
                        <input type="number" id="maxz" placeholder="最大值" value="1000">
                    </div>
                </div>
                
                <!-- 对比模式选项 -->
                <div class="comparison-toggle" id="comparison-options" style="display: none;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="parallel-query">
                        <span class="slider"></span>
                    </label>
                    <span>并行查询（同时发送请求）</span>
                </div>
                
                <button class="btn btn-primary" onclick="executeQuery()">
                    执行查询
                </button>
            </div>
            
            <!-- 结果面板 -->
            <div class="panel results-panel">
                <h2>查询结果</h2>
                
                <!-- 单一结果视图 -->
                <div id="single-result" class="single-result-view">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="result-count">0</div>
                            <div class="stat-label">结果数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="query-time">0ms</div>
                            <div class="stat-label">查询耗时</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="interface-type">HTTP</div>
                            <div class="stat-label">接口类型</div>
                        </div>
                    </div>
                    
                    <div class="results-list" id="results-list">
                        <p style="text-align: center; color: #999; padding: 20px;">
                            暂无查询结果
                        </p>
                    </div>
                </div>
                
                <!-- 对比结果视图 -->
                <div id="comparison-result" class="comparison-view" style="display: none;">
                    <div class="result-section">
                        <h3>
                            <span class="method-badge http">HTTP</span>
                            REST API 结果
                        </h3>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="http-count">0</div>
                                <div class="stat-label">结果数</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="http-time">0ms</div>
                                <div class="stat-label">耗时</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="http-status">-</div>
                                <div class="stat-label">状态</div>
                            </div>
                        </div>
                        <div class="results-list" id="http-results">
                            <p style="text-align: center; color: #999;">等待查询...</p>
                        </div>
                    </div>
                    
                    <div class="result-section">
                        <h3>
                            <span class="method-badge grpc">gRPC</span>
                            Service 结果
                        </h3>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="grpc-count">0</div>
                                <div class="stat-label">结果数</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="grpc-time">0ms</div>
                                <div class="stat-label">耗时</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="grpc-status">-</div>
                                <div class="stat-label">状态</div>
                            </div>
                        </div>
                        <div class="results-list" id="grpc-results">
                            <p style="text-align: center; color: #999;">等待查询...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载提示 -->
    <div class="loading-overlay" id="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <p id="loading-text">正在查询...</p>
        </div>
    </div>
    
    <script>
        // 接口选择处理
        document.querySelectorAll('input[name="interface"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const indicator = document.getElementById('status-indicator');
                const apiInfo = document.getElementById('api-info');
                const apiEndpoint = document.getElementById('api-endpoint');
                const apiFeatures = document.getElementById('api-features');
                const comparisonOptions = document.getElementById('comparison-options');
                const singleResult = document.getElementById('single-result');
                const comparisonResult = document.getElementById('comparison-result');
                
                switch(this.value) {
                    case 'http':
                        indicator.className = 'status-indicator http';
                        indicator.textContent = '使用 HTTP API';
                        apiEndpoint.textContent = 'GET /api/sqlite-spatial/query';
                        apiFeatures.textContent = '简单易用，适合浏览器直接调用';
                        comparisonOptions.style.display = 'none';
                        singleResult.style.display = 'block';
                        comparisonResult.style.display = 'none';
                        break;
                    case 'grpc':
                        indicator.className = 'status-indicator grpc';
                        indicator.textContent = '使用 gRPC Service';
                        apiEndpoint.textContent = 'grpc://localhost:9090/SpatialQueryService';
                        apiFeatures.textContent = '高性能，支持流式传输，适合服务间调用';
                        comparisonOptions.style.display = 'none';
                        singleResult.style.display = 'block';
                        comparisonResult.style.display = 'none';
                        break;
                    case 'both':
                        indicator.className = 'status-indicator';
                        indicator.style.background = 'linear-gradient(90deg, #10b981 50%, #3b82f6 50%)';
                        indicator.textContent = '对比测试模式';
                        apiEndpoint.textContent = 'HTTP API vs gRPC Service';
                        apiFeatures.textContent = '同时测试两种接口，对比性能差异';
                        comparisonOptions.style.display = 'flex';
                        singleResult.style.display = 'none';
                        comparisonResult.style.display = 'grid';
                        break;
                }
            });
        });
        
        // 执行查询
        async function executeQuery() {
            const selectedInterface = document.querySelector('input[name="interface"]:checked').value;
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');
            
            const queryParams = {
                minx: parseFloat(document.getElementById('minx').value),
                maxx: parseFloat(document.getElementById('maxx').value),
                miny: parseFloat(document.getElementById('miny').value),
                maxy: parseFloat(document.getElementById('maxy').value),
                minz: parseFloat(document.getElementById('minz').value),
                maxz: parseFloat(document.getElementById('maxz').value)
            };
            
            loading.classList.add('show');
            
            try {
                if (selectedInterface === 'http') {
                    loadingText.textContent = '正在通过 HTTP API 查询...';
                    await queryViaHTTP(queryParams);
                } else if (selectedInterface === 'grpc') {
                    loadingText.textContent = '正在通过 gRPC Service 查询...';
                    await queryViaGRPC(queryParams);
                } else if (selectedInterface === 'both') {
                    const parallel = document.getElementById('parallel-query').checked;
                    if (parallel) {
                        loadingText.textContent = '正在并行查询两个接口...';
                        await Promise.all([
                            queryViaHTTP(queryParams, true),
                            queryViaGRPC(queryParams, true)
                        ]);
                    } else {
                        loadingText.textContent = '正在查询 HTTP API...';
                        await queryViaHTTP(queryParams, true);
                        loadingText.textContent = '正在查询 gRPC Service...';
                        await queryViaGRPC(queryParams, true);
                    }
                }
            } catch (error) {
                alert('查询错误: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // HTTP 查询
        async function queryViaHTTP(params, isComparison = false) {
            const startTime = performance.now();
            
            try {
                const queryString = new URLSearchParams(params);
                const response = await fetch(`/api/sqlite-spatial/query?${queryString}`);
                const data = await response.json();
                
                const endTime = performance.now();
                const queryTime = Math.round(endTime - startTime);
                
                if (!isComparison) {
                    // 单一查询模式
                    displaySingleResult(data.results || [], queryTime, 'HTTP');
                } else {
                    // 对比模式
                    displayComparisonResult('http', data.results || [], queryTime, data.success);
                }
            } catch (error) {
                if (isComparison) {
                    displayComparisonResult('http', [], 0, false, error.message);
                } else {
                    throw error;
                }
            }
        }
        
        // Initialize gRPC client
        let grpcClient = null;
        
        // Initialize gRPC client on page load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                grpcClient = new GrpcSpatialQueryClient('http://localhost:8080');
                console.log('gRPC client initialized');
            } catch (error) {
                console.warn('Failed to initialize gRPC client:', error);
            }
        });
        
        // gRPC 查询（使用 gRPC-Web 客户端）
        async function queryViaGRPC(params, isComparison = false) {
            const startTime = performance.now();
            
            try {
                // 如果 gRPC 客户端未初始化，尝试初始化
                if (!grpcClient) {
                    grpcClient = new GrpcSpatialQueryClient('http://localhost:8080');
                }
                
                // 构建 gRPC 请求
                const request = {
                    refno: 1000, // 默认 refno，可以根据需要修改
                    customBbox: {
                        min: { x: params.minx, y: params.miny, z: params.minz },
                        max: { x: params.maxx, y: params.maxy, z: params.maxz }
                    },
                    elementTypes: [],
                    includeSelf: false,
                    tolerance: 0.001,
                    maxResults: 1000
                };
                
                // 执行 gRPC 查询
                const data = await grpcClient.queryIntersectingElements(request);
                const endTime = performance.now();
                const queryTime = Math.round(endTime - startTime);
                
                if (!isComparison) {
                    displaySingleResult(data.elements || [], queryTime, 'gRPC');
                } else {
                    displayComparisonResult('grpc', data.elements || [], queryTime, data.success);
                }
            } catch (error) {
                // 如果 gRPC 代理不可用，尝试通过 HTTP 代理
                try {
                    const response = await fetch('/api/grpc-proxy/spatial-query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            custom_bbox: {
                                min: { x: params.minx, y: params.miny, z: params.minz },
                                max: { x: params.maxx, y: params.maxy, z: params.maxz }
                            }
                        })
                    });
                    
                    const data = await response.json();
                    const endTime = performance.now();
                    const queryTime = Math.round(endTime - startTime);
                    
                    if (!isComparison) {
                        displaySingleResult(data.elements || [], queryTime, 'gRPC (via proxy)');
                    } else {
                        displayComparisonResult('grpc', data.elements || [], queryTime, true);
                    }
                } catch (proxyError) {
                    const endTime = performance.now();
                    const queryTime = Math.round(endTime - startTime);
                    
                    if (isComparison) {
                        displayComparisonResult('grpc', [], queryTime, false, 'gRPC 服务不可用');
                    } else {
                        alert('gRPC 服务需要通过代理访问。\n请运行: ./setup-grpc-web.sh');
                    }
                }
            }
        }
        
        // 显示单一结果
        function displaySingleResult(results, queryTime, interfaceType) {
            document.getElementById('result-count').textContent = results.length;
            document.getElementById('query-time').textContent = `${queryTime}ms`;
            document.getElementById('interface-type').textContent = interfaceType;
            
            const resultsList = document.getElementById('results-list');
            if (results.length === 0) {
                resultsList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">没有找到匹配的结果</p>';
            } else {
                resultsList.innerHTML = results.slice(0, 100).map(item => `
                    <div class="result-item">
                        <strong>RefNo: ${item.refno || item.id}</strong>
                        ${item.aabb ? `<br>范围: (${item.aabb.min.x.toFixed(1)}, ${item.aabb.min.y.toFixed(1)}, ${item.aabb.min.z.toFixed(1)}) - (${item.aabb.max.x.toFixed(1)}, ${item.aabb.max.y.toFixed(1)}, ${item.aabb.max.z.toFixed(1)})` : ''}
                    </div>
                `).join('');
                
                if (results.length > 100) {
                    resultsList.innerHTML += '<p style="text-align: center; color: #999; padding: 10px;">仅显示前 100 条结果</p>';
                }
            }
        }
        
        // 显示对比结果
        function displayComparisonResult(type, results, queryTime, success, error = null) {
            const prefix = type === 'http' ? 'http' : 'grpc';
            
            document.getElementById(`${prefix}-count`).textContent = results.length;
            document.getElementById(`${prefix}-time`).textContent = `${queryTime}ms`;
            document.getElementById(`${prefix}-status`).textContent = success ? '✓' : '✗';
            document.getElementById(`${prefix}-status`).style.color = success ? '#10b981' : '#ef4444';
            
            const resultsList = document.getElementById(`${prefix}-results`);
            if (error) {
                resultsList.innerHTML = `<p style="color: #ef4444; text-align: center;">${error}</p>`;
            } else if (results.length === 0) {
                resultsList.innerHTML = '<p style="text-align: center; color: #999;">没有结果</p>';
            } else {
                resultsList.innerHTML = results.slice(0, 50).map(item => `
                    <div class="result-item">
                        RefNo: ${item.refno || item.id}
                    </div>
                `).join('');
                
                if (results.length > 50) {
                    resultsList.innerHTML += `<p style="text-align: center; color: #999;">共 ${results.length} 条（显示前 50 条）</p>`;
                }
            }
            
            // 如果两个接口都返回了结果，计算性能差异
            const httpTime = document.getElementById('http-time').textContent;
            const grpcTime = document.getElementById('grpc-time').textContent;
            if (httpTime && grpcTime && httpTime !== '-' && grpcTime !== '-') {
                const httpMs = parseInt(httpTime);
                const grpcMs = parseInt(grpcTime);
                if (!isNaN(httpMs) && !isNaN(grpcMs)) {
                    const improvement = ((httpMs - grpcMs) / httpMs * 100).toFixed(1);
                    const factor = (httpMs / grpcMs).toFixed(2);
                    
                    // 显示性能对比
                    const comparisonText = grpcMs < httpMs 
                        ? `gRPC 快 ${Math.abs(improvement)}% (${factor}x)`
                        : `HTTP 快 ${Math.abs(improvement)}% (${(1/factor).toFixed(2)}x)`;
                    
                    // 更新界面显示
                    const statusIndicator = document.getElementById('status-indicator');
                    statusIndicator.textContent = `对比结果: ${comparisonText}`;
                }
            }
        }
        
        // 执行性能基准测试
        async function runBenchmark() {
            if (!grpcClient) {
                alert('gRPC 客户端未初始化，请先初始化客户端');
                return;
            }
            
            const params = {
                minx: parseFloat(document.getElementById('minx').value),
                maxx: parseFloat(document.getElementById('maxx').value),
                miny: parseFloat(document.getElementById('miny').value),
                maxy: parseFloat(document.getElementById('maxy').value),
                minz: parseFloat(document.getElementById('minz').value),
                maxz: parseFloat(document.getElementById('maxz').value)
            };
            
            const request = {
                refno: 1000,
                customBbox: {
                    min: { x: params.minx, y: params.miny, z: params.minz },
                    max: { x: params.maxx, y: params.maxy, z: params.maxz }
                },
                elementTypes: [],
                includeSelf: false,
                tolerance: 0.001,
                maxResults: 1000
            };
            
            try {
                const loading = document.getElementById('loading');
                const loadingText = document.getElementById('loading-text');
                loading.classList.add('show');
                loadingText.textContent = '正在运行性能基准测试...';
                
                const results = await grpcClient.benchmarkComparison(request, 10);
                
                // 显示基准测试结果
                alert(`性能基准测试结果（10次迭代）:\n\n` +
                    `HTTP API:\n` +
                    `  平均时间: ${results.http.avgTime.toFixed(2)}ms\n` +
                    `  最小时间: ${results.http.minTime.toFixed(2)}ms\n` +
                    `  最大时间: ${results.http.maxTime.toFixed(2)}ms\n\n` +
                    `gRPC Service:\n` +
                    `  平均时间: ${results.grpc.avgTime.toFixed(2)}ms\n` +
                    `  最小时间: ${results.grpc.minTime.toFixed(2)}ms\n` +
                    `  最大时间: ${results.grpc.maxTime.toFixed(2)}ms\n\n` +
                    `性能提升: ${results.improvement.percentage}% (${results.improvement.factor}x)`
                );
            } catch (error) {
                alert('基准测试失败: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            } else if (e.ctrlKey && e.key === 'b') {
                runBenchmark();
            }
        });
    </script>
</body>
